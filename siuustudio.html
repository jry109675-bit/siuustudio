        const weekTheme = currentCalendar?.weeklyThemes?.[activeWeek - 1];

        return (
            <div className="space-y-6 slide-up">
                <div className="mb-6">
                    <h2 className="text-2xl font-display font-bold text-white">Content Calendar</h2>
                    <p className="text-slate-500 text-sm mt-1">4-week posting schedule built for your niche</p>
                </div>
                <Card>
                    <div className="space-y-4">
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div className="sm:col-span-2">
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Your Niche</label>
                                <input type="text" value={niche} onChange={e => setNiche(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleGenerate()}
                                    placeholder="e.g., Fitness & Wellness, Tech Reviews, Cooking..."
                                    className="w-full px-4 py-3 bg-slate-900 border border-slate-700/60 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white placeholder-slate-600 text-sm"
                                    disabled={isGenerating} />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Posts Per Week</label>
                                <select value={postsPerWeek} onChange={e => setPostsPerWeek(parseInt(e.target.value))}
                                    className="w-full px-4 py-3 bg-slate-900 border border-slate-700/60 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white text-sm"
                                    disabled={isGenerating}>
                                    {[1,2,3,4,5,6,7].map(n => <option key={n} value={n}>{n}x / week</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <Btn onClick={handleGenerate} disabled={isGenerating || !niche.trim()} icon={isGenerating ? 'refresh' : 'calendar'} className="flex-1 justify-center">
                                {isGenerating ? 'Building Calendar...' : currentCalendar ? 'Rebuild Calendar' : 'Build 4-Week Calendar'}
                            </Btn>
                            {isGenerating && <Btn onClick={() => abortRef.current?.abort()} variant="danger" icon="stop" size="md">Stop</Btn>}
                        </div>
                    </div>
                </Card>

                {isGenerating && streamContent && <StreamBox content={streamContent} label={`Planning ${postsPerWeek * 4} posts across 4 weeks...`} />}

                {currentCalendar && !isGenerating && currentCalendar.posts.length > 0 && (
                    <div className="space-y-4 slide-up">
                        {currentCalendar.strategyTip && (
                            <div className="glass rounded-xl p-4 border border-orange-500/15 bg-orange-500/5 flex items-start gap-3">
                                <Icon path={I.lightbulb} className="w-4 h-4 text-orange-400 mt-0.5 flex-shrink-0" />
                                <div><p className="text-xs text-orange-400 uppercase font-semibold tracking-wider mb-0.5">Strategy Tip</p><p className="text-slate-300 text-sm">{currentCalendar.strategyTip}</p></div>
                            </div>
                        )}

                        {/* Week tabs */}
                        <div className="flex gap-2">
                            {[1,2,3,4].map(w => (
                                <button key={w} onClick={() => setActiveWeek(w)}
                                    className={`flex-1 py-2 px-3 rounded-xl text-xs font-semibold font-display transition-all ${activeWeek === w ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/20' : 'bg-slate-800/60 text-slate-400 hover:text-white hover:bg-slate-700/60'}`}>
                                    Week {w}
                                </button>
                            ))}
                        </div>

                        {weekTheme && (
                            <div className="text-center py-1">
                                <span className="text-xs text-slate-500">Week {activeWeek} Theme: </span>
                                <span className="text-orange-400 font-semibold text-sm">{weekTheme}</span>
                            </div>
                        )}

                        <div className="space-y-3">
                            {weekPosts.length === 0 ? (
                                <div className="glass rounded-xl p-8 text-center text-slate-500 text-sm">No posts generated for this week.</div>
                            ) : weekPosts.map((post, i) => (
                                <div key={post.id} className="glass rounded-xl p-4 border border-white/5 hover:border-orange-500/15 transition-colors">
                                    <div className="flex items-start gap-3">
                                        <div className="w-7 h-7 rounded-lg bg-slate-800 flex items-center justify-center flex-shrink-0 mt-0.5">
                                            <span className="text-slate-400 text-xs font-bold">{i + 1}</span>
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 flex-wrap mb-2">
                                                <span className="text-white font-medium text-sm">{post.title}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5 mb-2">
                                                <Badge variant="default">{post.day}</Badge>
                                                <Badge variant="orange">{post.format}</Badge>
                                                <Badge variant={goalColors[post.goal] || 'default'}>{post.goal}</Badge>
                                                <span className="text-xs text-slate-600">{post.platform}</span>
                                            </div>
                                            {post.hook && <p className="text-xs text-slate-500 italic">Hook: "{post.hook}"</p>}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // ─── Chat Widget ─────────────────────────────────────────────────────────────
    const ChatWidget = () => {
        const {
            api, chatOpen, setChatOpen, chatMessages, addChatMessage, setChatMessages,
            currentProject, currentIdea, currentHookAnalysis, currentScript,
            currentCaptions, currentShotPlan, currentEditingGuide, currentThumbnailData,
            currentUser,
        } = useStore();
        const { toast } = useToast();
        const [input, setInput] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [streaming, setStreaming] = useState('');
        const [sessionId, setSessionId] = useState(null);
        const sessionIdRef = useRef(null); // ref so closures always read the live value
        const [loadingHistory, setLoadingHistory] = useState(false);
        // History panel state
        const [showHistory, setShowHistory] = useState(false);
        const [pastSessions, setPastSessions] = useState([]);
        const [loadingPastSessions, setLoadingPastSessions] = useState(false);
        const [viewingPast, setViewingPast] = useState(false); // true when browsing a historical session (read-only)
        const [renamingId, setRenamingId] = useState(null);   // session id currently being renamed
        const [renameValue, setRenameValue] = useState('');
        const [confirmDeleteId, setConfirmDeleteId] = useState(null); // session id awaiting delete confirm
        const bottomRef = useRef(null);
        const abortRef = useRef(null);
        const streamRef = useRef('');

        // ── Load today's session on open ───────────────────────────────────────
        useEffect(() => {
            if (!chatOpen || !currentUser || !currentProject) return;
            setShowHistory(false);
            setViewingPast(false);
            (async () => {
                setLoadingHistory(true);
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const sessionKey = `project-${currentProject.id}-${today}`;

                    const { data: existingSession } = await window._sb
                        .from('coach_chat_sessions')
                        .select('id, messages')
                        .eq('user_id', currentUser.id)
                        .eq('project_id', currentProject.id)
                        .eq('session_key', sessionKey)
                        .maybeSingle();

                    if (existingSession) {
                        sessionIdRef.current = existingSession.id; setSessionId(existingSession.id);
                        if (existingSession.messages && existingSession.messages.length > 0) {
                            setChatMessages(existingSession.messages);
                        }
                    } else {
                        const initMsg = { id: crypto.randomUUID(), role: 'assistant', content: `SIUUU! 🏆 Let's work on **${currentProject.name}**. What do you need help with?` };
                        const { data: newSession } = await window._sb
                            .from('coach_chat_sessions')
                            .insert({ user_id: currentUser.id, session_key: sessionKey, project_id: currentProject.id, messages: [initMsg] })
                            .select('id')
                            .single();
                        if (newSession) {
                            sessionIdRef.current = newSession.id; setSessionId(newSession.id);
                            setChatMessages([initMsg]);
                        }
                    }
                } catch (err) {
                    console.warn('Coach chat persistence unavailable:', err.message);
                } finally {
                    setLoadingHistory(false);
                }
            })();
        }, [chatOpen, currentUser?.id, currentProject?.id]);

        useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages, streaming, chatOpen]);

        // ── Fetch all past sessions for the history panel ──────────────────────
        const openHistory = async () => {
            setShowHistory(true);
            setLoadingPastSessions(true);
            try {
                // RLS already scopes results to the signed-in user — no .eq needed.
                // Order by created_at so old sessions (which may lack a reliable
                // updated_at) still appear correctly.
                const { data, error } = await window._sb
                    .from('coach_chat_sessions')
                    .select('id, session_key, messages, updated_at, created_at, project_id')
                    .eq('project_id', currentProject.id)
                    .order('created_at', { ascending: false })
                    .limit(60);
                if (error) throw error;
                setPastSessions(data || []);
            } catch (err) {
                console.warn('Could not load past sessions:', err.message, err);
                setPastSessions([]);
            } finally {
                setLoadingPastSessions(false);
            }
        };

        // ── Load a historical session (read-only view) ─────────────────────────
        const loadPastSession = (session) => {
            setChatMessages(session.messages || []);
            setViewingPast(true);
            setShowHistory(false);
        };

        // ── Continue a historical session (make it the active one) ─────────────
        const continueSession = async (session) => {
            sessionIdRef.current = session.id; setSessionId(session.id);
            setChatMessages(session.messages || []);
            setViewingPast(false);
            setShowHistory(false);
        };

        // ── Delete a session ────────────────────────────────────────────────────
        const deleteSession = async (sessionId) => {
            try {
                const { error } = await window._sb
                    .from('coach_chat_sessions')
                    .delete()
                    .eq('id', sessionId);
                if (error) throw error;
                setPastSessions(prev => prev.filter(s => s.id !== sessionId));
                // If we just deleted the active session, reset it
                if (sessionIdRef.current === sessionId) {
                    sessionIdRef.current = null; setSessionId(null);
                    setChatMessages([{ id: crypto.randomUUID(), role: 'assistant', content: `SIUUU! 🏆 Let's work on **${currentProject?.name}**. What do you need help with?` }]);
                }
            } catch (err) {
                toast('Could not delete chat: ' + err.message, 'error');
            } finally {
                setConfirmDeleteId(null);
            }
        };

        // ── Rename a session (stores custom name in session_key metadata) ───────
        const renameSession = async (sessionId) => {
            const trimmed = renameValue.trim();
            if (!trimmed) { setRenamingId(null); return; }
            try {
                const { error } = await window._sb
                    .from('coach_chat_sessions')
                    .update({ session_key: `custom-name:${trimmed}` })
                    .eq('id', sessionId);
                if (error) throw error;
                setPastSessions(prev => prev.map(s => s.id === sessionId ? { ...s, session_key: `custom-name:${trimmed}` } : s));
            } catch (err) {
                toast('Could not rename chat: ' + err.message, 'error');
            } finally {
                setRenamingId(null); setRenameValue('');
            }
        };

        // ── Save messages to Supabase ───────────────────────────────────────────
        const persistMessages = async (messages) => {
            const sid = sessionIdRef.current; // always the live value — avoids stale closure
            if (!sid) return;
            try {
                await window._sb
                    .from('coach_chat_sessions')
                    .update({ messages, updated_at: new Date().toISOString() })
                    .eq('id', sid);
            } catch (err) {
                console.warn('Could not persist chat:', err.message);
            }
        };

        // ── Start a brand-new session (project-scoped; requires an active project) ──
        const startNewChat = async () => {
            if (!currentProject) {
                toast('Select a project first to start an AI Coach chat.', 'error');
                return;
            }
            setViewingPast(false);
            setShowHistory(false);
            const now = new Date();
            const sessionKey = `project-${currentProject.id}-${now.toISOString()}`;
            const initMsg = { id: crypto.randomUUID(), role: 'assistant', content: `SIUUU! 🏆 Fresh start on **${currentProject.name}**! What are we creating?` };
            setChatMessages([initMsg]);
            try {
                const { data: newSession } = await window._sb
                    .from('coach_chat_sessions')
                    .insert({ user_id: (currentUser?.id ?? window._sbUser?.id), session_key: sessionKey, project_id: currentProject.id, messages: [initMsg] })
                    .select('id')
                    .single();
                if (newSession) { sessionIdRef.current = newSession.id; setSessionId(newSession.id); }
            } catch (err) { console.warn('Could not create new session:', err.message); }
        };

        const handleSend = async () => {
            if (!input.trim() || isLoading) return;
            if (!currentProject) {
                toast('Select a project first to chat with your AI Coach.', 'error');
                return;
            }
            // If viewing a past session, resume it first
            if (viewingPast) setViewingPast(false);
            const userMsg = input.trim();
            setInput('');
            const userMsgObj = { id: crypto.randomUUID(), role: 'user', content: userMsg, timestamp: new Date().toISOString() };
            const updatedWithUser = [...chatMessages, userMsgObj];
            addChatMessage(userMsgObj);
            setIsLoading(true); setStreaming(''); streamRef.current = '';
            abortRef.current = new AbortController();

            const projectContext = {
                project: currentProject, idea: currentIdea,
                hookAnalysis: currentHookAnalysis, script: currentScript,
                captions: currentCaptions, shotPlan: currentShotPlan,
                editingGuide: currentEditingGuide, thumbnailData: currentThumbnailData,
            };

            try {
                const history = chatMessages.map(m => ({ role: m.role, content: m.content }));
                await api.sendChatMessage(history, userMsg, {
                    onStream: (full) => { streamRef.current = full; setStreaming(full); },
                    signal: abortRef.current.signal,
                    projectContext,
                });
                const assistantMsgObj = { id: crypto.randomUUID(), role: 'assistant', content: streamRef.current || '...SIUUU!', timestamp: new Date().toISOString() };
                const updatedWithBoth = [...updatedWithUser, assistantMsgObj];
                addChatMessage(assistantMsgObj);
                await persistMessages(updatedWithBoth);
            } catch (e) {
                if (e.name !== 'AbortError') {
                    toast('Chat error: ' + e.message, 'error');
                    addChatMessage({ id: crypto.randomUUID(), role: 'assistant', content: 'Oops, error. Try again! SIUUU!' });
                }
            } finally { setIsLoading(false); setStreaming(''); streamRef.current = ''; }
        };

        // ── Helpers ────────────────────────────────────────────────────────────
        const sessionName = (session) => {
            const key = session.session_key || '';
            if (key.startsWith('custom-name:')) return key.slice('custom-name:'.length);
            return null; // no custom name
        };

        const formatSessionLabel = (session) => {
            // Try to extract a date from the session_key first;
            // fall back to created_at so all sessions get a valid label.
            const key = session.session_key || '';
            const dateMatch = key.match(/(\d{4}-\d{2}-\d{2})/);
            const rawDate = dateMatch ? dateMatch[1] : (session.created_at || session.updated_at || null);
            if (!rawDate) return 'Older';
            const date = new Date(rawDate);
            if (isNaN(date.getTime())) return 'Older';
            const today = new Date(); today.setHours(0,0,0,0);
            const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
            if (date >= today) return 'Today';
            if (date >= yesterday) return 'Yesterday';
            return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        };

        const sessionPreview = (session) => {
            const msgs = session.messages || [];
            const lastUser = [...msgs].reverse().find(m => m.role === 'user');
            return lastUser ? lastUser.content.slice(0, 60) + (lastUser.content.length > 60 ? '…' : '') : 'No messages yet';
        };

        const hasProject = !!currentProject;

        // Group sessions by date label
        const groupedSessions = pastSessions.reduce((acc, s) => {
            const label = formatSessionLabel(s);
            if (!acc[label]) acc[label] = [];
            acc[label].push(s);
            return acc;
        }, {});

        return (
            <>
                {!chatOpen && (
                    <button onClick={() => { if (!currentProject) { toast('Select a project first to use AI Coach.', 'error'); return; } setChatOpen(true); }} className="fixed bottom-16 right-6 w-14 h-14 bg-orange-500 hover:bg-orange-600 rounded-2xl shadow-xl shadow-orange-500/30 flex items-center justify-center transition-all hover:scale-105 z-50 glow-pulse">
                        <Icon path={I.message} className="w-6 h-6 text-white" />
                    </button>
                )}
                {chatOpen && (
                    <div className="fixed bottom-6 right-6 w-96 h-[560px] glass rounded-2xl shadow-2xl flex flex-col z-50 slide-up border border-orange-500/10" style={{ maxWidth: 'calc(100vw - 48px)' }}>

                        {/* ── Header ── */}
                        <div className="flex items-center justify-between px-4 py-3 border-b border-white/5 flex-shrink-0">
                            <div className="flex items-center gap-3">
                                {showHistory ? (
                                    <button onClick={() => setShowHistory(false)} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition-colors">
                                        <Icon path={I.chevronLeft} className="w-4 h-4" />
                                    </button>
                                ) : (
                                    <div className="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center"><Icon path={I.trophy} className="w-4 h-4 text-white" /></div>
                                )}
                                <div>
                                    <h3 className="font-display font-semibold text-white text-sm">{showHistory ? 'Chat History' : 'AI Coach'}</h3>
                                    {!showHistory && (
                                        <div className="flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                                            <span className="text-xs text-slate-500">
                                                {viewingPast ? 'Viewing past chat' : hasProject ? currentProject.name : 'No project selected'}
                                            </span>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="flex items-center gap-1">
                                {!showHistory && (
                                    <button onClick={openHistory} title="Chat history" className="text-slate-500 hover:text-orange-400 p-1.5 rounded-lg hover:bg-slate-800 transition-colors">
                                        <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    </button>
                                )}
                                {!showHistory && (
                                    <button onClick={startNewChat} title="New chat" className="text-slate-500 hover:text-orange-400 text-xs px-2 py-1 rounded-lg hover:bg-slate-800 transition-colors">New</button>
                                )}
                                <button onClick={() => setChatOpen(false)} className="text-slate-500 hover:text-white p-1.5 rounded-lg hover:bg-slate-800 transition-colors"><Icon path={I.close} className="w-4 h-4" /></button>
                            </div>
                        </div>

                        {/* ── History Panel ── */}
                        {showHistory && (
                            <div className="flex-1 overflow-y-auto">
                                <div className="px-4 pt-3 pb-2 flex-shrink-0">
                                    <button onClick={startNewChat} className="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl border border-orange-500/30 bg-orange-500/10 text-orange-400 hover:bg-orange-500/20 text-xs font-medium transition-colors">
                                        <Icon path={I.plus} className="w-3.5 h-3.5" /> Start new chat
                                    </button>
                                </div>
                                {loadingPastSessions && (
                                    <div className="flex justify-center py-8">
                                        <div className="flex gap-1.5">{[0, 0.15, 0.3].map((d, i) => <span key={i} className="w-1.5 h-1.5 bg-slate-600 rounded-full animate-bounce" style={{ animationDelay: `${d}s` }} />)}</div>
                                    </div>
                                )}
                                {!loadingPastSessions && pastSessions.length === 0 && (
                                    <div className="flex flex-col items-center justify-center py-12 text-center px-6">
                                        <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.5" className="text-slate-600 mb-3"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <p className="text-xs text-slate-500">No past chats for this project yet.</p>
                                    </div>
                                )}
                                {!loadingPastSessions && Object.entries(groupedSessions).map(([label, sessions]) => (
                                    <div key={label} className="px-4 mb-4">
                                        <div className="text-[10px] font-semibold text-slate-600 uppercase tracking-widest mb-2 px-1">{label}</div>
                                        <div className="flex flex-col gap-1">
                                            {sessions.map(s => (
                                                <div key={s.id} className="rounded-xl bg-slate-800/60 border border-white/5 hover:border-orange-500/20 transition-all group overflow-hidden">
                                                    {/* ── Rename input (shown when editing) ── */}
                                                    {renamingId === s.id ? (
                                                        <div className="px-3 py-2.5 flex items-center gap-2">
                                                            <input
                                                                autoFocus
                                                                value={renameValue}
                                                                onChange={e => setRenameValue(e.target.value)}
                                                                onKeyDown={e => { if (e.key === 'Enter') renameSession(s.id); if (e.key === 'Escape') { setRenamingId(null); setRenameValue(''); } }}
                                                                placeholder="Chat name…"
                                                                className="flex-1 bg-slate-700 text-white text-xs rounded-lg px-2.5 py-1.5 outline-none border border-orange-500/40 focus:border-orange-500 min-w-0"
                                                            />
                                                            <button onClick={() => renameSession(s.id)} className="text-[10px] text-orange-400 hover:text-orange-300 font-medium px-2 py-1 rounded-lg hover:bg-orange-500/10 transition-colors flex-shrink-0">Save</button>
                                                            <button onClick={() => { setRenamingId(null); setRenameValue(''); }} className="text-[10px] text-slate-500 hover:text-slate-400 px-1.5 py-1 rounded-lg hover:bg-slate-700 transition-colors flex-shrink-0">✕</button>
                                                        </div>
                                                    ) : confirmDeleteId === s.id ? (
                                                        /* ── Delete confirm ── */
                                                        <div className="px-3 py-2.5 flex items-center gap-2">
                                                            <span className="flex-1 text-xs text-red-400">Delete this chat?</span>
                                                            <button onClick={() => deleteSession(s.id)} className="text-[10px] text-red-400 hover:text-red-300 font-medium px-2 py-1 rounded-lg hover:bg-red-500/10 transition-colors flex-shrink-0">Delete</button>
                                                            <button onClick={() => setConfirmDeleteId(null)} className="text-[10px] text-slate-500 hover:text-slate-400 px-1.5 py-1 rounded-lg hover:bg-slate-700 transition-colors flex-shrink-0">Cancel</button>
                                                        </div>
                                                    ) : (
                                                        /* ── Normal card view ── */
                                                        <div className="flex items-stretch">
                                                            <button onClick={() => loadPastSession(s)} className="flex-1 text-left px-3 py-2.5 min-w-0">
                                                                <div className="flex items-center justify-between gap-2 mb-1">
                                                                    <span className="text-[10px] text-slate-500 group-hover:text-orange-400 transition-colors truncate">
                                                                        {sessionName(s) || (s.project_id ? '📁 Project chat' : '💬 General chat')}
                                                                    </span>
                                                                    <span className="text-[10px] text-slate-600 flex-shrink-0">{(s.messages || []).filter(m => m.role === 'user').length} msgs</span>
                                                                </div>
                                                                <p className="text-xs text-slate-300 leading-relaxed truncate">{sessionPreview(s)}</p>
                                                            </button>
                                                            {/* ── Action buttons (visible on hover) ── */}
                                                            <div className="flex flex-col justify-center gap-0.5 pr-2 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                                                                <button
                                                                    onClick={e => { e.stopPropagation(); setConfirmDeleteId(null); setRenamingId(s.id); setRenameValue(sessionName(s) || ''); }}
                                                                    title="Rename"
                                                                    className="p-1.5 rounded-lg text-slate-500 hover:text-orange-400 hover:bg-slate-700 transition-colors"
                                                                >
                                                                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                                                </button>
                                                                <button
                                                                    onClick={e => { e.stopPropagation(); setRenamingId(null); setConfirmDeleteId(s.id); }}
                                                                    title="Delete"
                                                                    className="p-1.5 rounded-lg text-slate-500 hover:text-red-400 hover:bg-slate-700 transition-colors"
                                                                >
                                                                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ── Chat View ── */}
                        {!showHistory && (
                            <>
                                {/* Past-session banner */}
                                {viewingPast && (
                                    <div className="px-4 pt-2 pb-1 flex-shrink-0">
                                        <div className="flex items-center justify-between gap-2 bg-slate-800/80 border border-slate-700/60 rounded-lg px-3 py-2">
                                            <span className="text-xs text-slate-400">Viewing past chat</span>
                                            <button onClick={() => { setViewingPast(false); }} className="text-[10px] text-orange-400 hover:text-orange-300 font-medium">Resume →</button>
                                        </div>
                                    </div>
                                )}

                                {/* Project context pill */}
                                {hasProject && !viewingPast && (
                                    <div className="px-4 pt-2 pb-1 flex-shrink-0">
                                        <div className="flex items-center gap-1.5 bg-orange-500/10 border border-orange-500/20 rounded-lg px-2.5 py-1.5">
                                            <Icon path={I.folder} className="w-3 h-3 text-orange-400 flex-shrink-0" />
                                            <span className="text-xs text-orange-300 truncate">Coaching on: <span className="font-medium">{currentProject.name}</span></span>
                                            {currentIdea && <span className="text-xs text-slate-500 ml-auto flex-shrink-0">+context</span>}
                                        </div>
                                    </div>
                                )}

                                {/* Messages */}
                                <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3">
                                    {loadingHistory && (
                                        <div className="flex justify-center py-4">
                                            <div className="flex gap-1.5">{[0, 0.15, 0.3].map((d, i) => <span key={i} className="w-1.5 h-1.5 bg-slate-600 rounded-full animate-bounce" style={{ animationDelay: `${d}s` }} />)}</div>
                                        </div>
                                    )}
                                    {!loadingHistory && chatMessages.map(msg => (
                                        <div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] rounded-xl px-3 py-2.5 text-xs leading-relaxed ${msg.role === 'user' ? 'bg-orange-500 text-white rounded-br-sm' : 'bg-slate-800 border border-slate-700/40 text-slate-200 rounded-bl-sm'}`}>
                                                {msg.role === 'assistant' ? <div className="md-content" dangerouslySetInnerHTML={{ __html: renderMarkdown(msg.content) }} /> : msg.content}
                                            </div>
                                        </div>
                                    ))}
                                    {isLoading && streaming && <div className="flex justify-start"><div className="max-w-[85%] rounded-xl rounded-bl-sm px-3 py-2.5 bg-slate-800 border border-slate-700/40"><div className="md-content text-xs text-slate-200 leading-relaxed" dangerouslySetInnerHTML={{ __html: renderMarkdown(streaming) }} /><span className="stream-cursor text-xs"></span></div></div>}
                                    {isLoading && !streaming && <div className="flex justify-start"><div className="bg-slate-800 border border-slate-700/40 rounded-xl rounded-bl-sm px-3 py-2.5 flex gap-1.5">{[0, 0.15, 0.3].map((d, i) => <span key={i} className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce" style={{ animationDelay: `${d}s` }} />)}</div></div>}
                                    <div ref={bottomRef} />
                                </div>

                                {/* Input — hidden when viewing a past session */}
                                {!viewingPast && (
                                    <div className="p-3 border-t border-white/5 flex-shrink-0">
                                        <div className="flex gap-2">
                                            <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }} placeholder={hasProject ? `Ask about ${currentProject.name}...` : 'Select a project to start...'} disabled={isLoading || loadingHistory} className="flex-1 px-3 py-2 bg-slate-900 border border-slate-700/60 rounded-xl text-white text-xs focus:ring-2 focus:ring-orange-500 outline-none placeholder-slate-600 disabled:opacity-40" />
                                            {isLoading ? <button onClick={() => abortRef.current?.abort()} className="px-3 py-2 bg-red-600/80 hover:bg-red-600 rounded-xl"><Icon path={I.stop} className="w-4 h-4 text-white" /></button> : <button onClick={handleSend} disabled={!input.trim() || loadingHistory} className="px-3 py-2 bg-orange-500 hover:bg-orange-600 rounded-xl disabled:opacity-40"><Icon path={I.send} className="w-4 h-4 text-white" /></button>}
                                        </div>
                                    </div>
                                )}

                                {/* When viewing past — show a "Start new / Continue" footer */}
                                {viewingPast && (
                                    <div className="p-3 border-t border-white/5 flex-shrink-0 flex gap-2">
                                        <button onClick={startNewChat} className="flex-1 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-medium border border-slate-700/60 transition-colors">New chat</button>
                                        <button onClick={() => setViewingPast(false)} className="flex-1 py-2 rounded-xl bg-orange-500 hover:bg-orange-600 text-white text-xs font-medium transition-colors">Continue this chat</button>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                )}
            </>
        );
    };
    // ─── Layout ──────────────────────────────────────────────────────────────────
    const Sidebar = () => {
        const { activeTab, setActiveTab, sidebarOpen } = useStore();
        const navItems = [
            { id: 'dashboard', label: 'Idea Generator', icon: 'sparkles' },
            { id: 'hook', label: 'Hook Analyzer', icon: 'target' },
            { id: 'thumbnail', label: 'Title & Thumbnail', icon: 'eye' },
            { id: 'shots', label: 'Shot Planner', icon: 'video' },
            { id: 'editing', label: 'Editing Guide', icon: 'scissors' },
            { id: 'script', label: 'Script Writer', icon: 'fileText' },
            { id: 'captions', label: 'Caption Generator', icon: 'hash' },
            { id: 'trends', label: 'Trend Analyzer', icon: 'trendingUp' },
            { id: 'calendar', label: 'Content Calendar', icon: 'calendar' },
            { id: 'projects', label: 'Projects Studio', icon: 'folder' },
        ];

        return (
            <>
                {/* Sidebar overlay on mobile */}
                {!sidebarOpen && <div className="lg:hidden fixed inset-0 bg-black/50 z-30" />}

                {/* Sidebar panel */}
                <div
                    className={`fixed lg:relative inset-y-0 left-0 z-40 bg-slate-950 border-r border-white/5 flex flex-col overflow-hidden sidebar-transition ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}
                    style={{ width: '240px', flexShrink: 0, maxWidth: sidebarOpen ? '240px' : '0px' }}
                >
                    <div className="p-5 flex-1 min-w-0">
                        <div className="flex items-center gap-3 mb-8 mt-1">
                            <div className="w-9 h-9 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/20 flex-shrink-0"><span className="text-white font-display font-bold text-lg">S</span></div>
                            <div className="min-w-0 overflow-hidden"><h1 className="text-white font-display font-bold truncate">SIUU STUDIO</h1><p className="text-xs text-slate-600 truncate">Creator Platform</p></div>
                        </div>
                        <div className="mb-2"><p className="text-xs text-slate-600 uppercase tracking-wider font-semibold px-3 mb-2 whitespace-nowrap">Workspace</p></div>
                        <nav className="space-y-0.5">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${activeTab === item.id ? 'nav-active text-orange-400' : 'text-slate-500 hover:bg-slate-800/60 hover:text-slate-200'}`}>
                                    <Icon path={I[item.icon]} className="w-4 h-4 flex-shrink-0" /><span className="truncate">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </div>
                </div>

            </>
        );
    };

    // ─── Provider Switcher ───────────────────────────────────────────────────────
    const ProviderSwitcher = () => {
        const { activeProvider, setActiveProvider, isGenerating } = useStore();
        const providers = Object.entries(PROVIDERS); // [['cerebras', {...}], ['nvidia', {...}]]

        return (
            <div className="flex items-center gap-1 bg-slate-900/80 border border-white/[0.06] rounded-xl p-1 relative">
                {/* Sliding highlight */}
                <div
                    className="absolute top-1 bottom-1 rounded-lg bg-slate-700/70 border border-white/[0.08] transition-all duration-200 ease-out pointer-events-none"
                    style={{
                        width: `calc(50% - 4px)`,
                        left: activeProvider === providers[0][0] ? '4px' : 'calc(50%)',
                    }}
                />
                {providers.map(([key, cfg]) => {
                    const active = activeProvider === key;
                    const dotColor = key === 'cerebras' ? 'bg-orange-400' : 'bg-green-400';
                    return (
                        <button
                            key={key}
                            onClick={() => !isGenerating && setActiveProvider(key)}
                            disabled={isGenerating}
                            title={isGenerating ? 'Cannot switch provider while generating' : `Switch to ${cfg.label}`}
                            className={`relative z-10 flex items-center gap-1.5 px-3 py-1 rounded-lg text-xs font-semibold font-display transition-all duration-200 select-none
                                ${active ? 'text-white' : 'text-slate-500 hover:text-slate-300'}
                                ${isGenerating ? 'cursor-not-allowed opacity-60' : 'cursor-pointer'}
                            `}
                        >
                            <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${active ? dotColor : 'bg-slate-600'} transition-colors duration-200`} />
                            {cfg.label}
                        </button>
                    );
                })}
            </div>
        );
    };

    const Header = () => {
        const { currentProject, clearActiveProject, sidebarOpen, setSidebarOpen, currentUser, userRole, setVarRoomOpen, setReportUserOpen } = useStore();
        const [profileOpen, setProfileOpen] = useState(false);
        const profileRef = useRef(null);

        // Close dropdown when clicking outside
        useEffect(() => {
            const handler = (e) => {
                if (profileRef.current && !profileRef.current.contains(e.target)) setProfileOpen(false);
            };
            document.addEventListener('mousedown', handler);
            return () => document.removeEventListener('mousedown', handler);
        }, []);

        const meta       = currentUser?.user_metadata ?? {};
        const avatarUrl  = meta.avatar_url || meta.picture || null;
        const displayName = meta.full_name || meta.name || currentUser?.email?.split('@')[0] || 'User';
        const email      = currentUser?.email || '';
        const initials   = displayName.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

        return (
            <header className="h-14 border-b border-white/5 bg-slate-950/50 backdrop-blur flex items-center justify-between px-6 flex-shrink-0">
                <div className="flex items-center gap-4">
                    {/* Mobile menu button */}
                    <button onClick={() => setSidebarOpen(!sidebarOpen)} className="lg:hidden p-2 text-slate-400 hover:text-white transition-colors">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={1.75}><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    {/* Desktop menu button */}
                    <button onClick={() => setSidebarOpen(!sidebarOpen)} className="hidden lg:block p-2 text-slate-400 hover:text-white transition-colors">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={1.75}><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                </div>
                <div className="flex items-center gap-3">
                    {currentProject ? (
                        <div className="flex items-center gap-3 bg-slate-800/50 rounded-lg px-3 py-1.5 border border-slate-700/50">
                            <Icon path={I.folder} className="w-4 h-4 text-orange-400" />
                            <span className="text-slate-200 font-medium font-display text-sm">{currentProject.name}</span>
                            <div className="w-px h-4 bg-slate-700 mx-1"></div>
                            <button onClick={clearActiveProject} className="text-xs text-slate-400 hover:text-white transition-colors flex items-center gap-1">
                                <Icon path={I.close} className="w-3 h-3" /> Close Project
                            </button>
                        </div>
                    ) : (
                        <div className="flex items-center gap-2">
                            <span className="text-slate-500 text-sm italic">No project selected</span>
                            <span className="text-slate-600 text-sm italic">· AI tools auto-create a project</span>
                        </div>
                    )}
                </div>

                {/* Provider Switcher */}
                <ProviderSwitcher />

                {/* Profile avatar + dropdown */}
                <div className="relative" ref={profileRef}>
                    <button
                        onClick={() => setProfileOpen(o => !o)}
                        className="flex items-center gap-2.5 pl-2 pr-3 py-1.5 rounded-xl hover:bg-slate-800/60 transition-all border border-transparent hover:border-white/5 group"
                        title="Account"
                    >
                        {/* Avatar */}
                        <div className="w-7 h-7 rounded-full overflow-hidden flex-shrink-0 ring-2 ring-transparent group-hover:ring-orange-500/40 transition-all">
                            {avatarUrl
                                ? <img src={avatarUrl} alt={displayName} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                                : <div className="w-full h-full bg-orange-500 flex items-center justify-center text-white font-bold text-xs font-display">{initials}</div>
                            }
                        </div>
                        {/* Name — hidden on mobile */}
                        <span className="hidden sm:block text-slate-300 text-xs font-medium max-w-[120px] truncate">{displayName}</span>
                        <svg className="w-3 h-3 text-slate-500 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/></svg>
                    </button>

                    {/* Dropdown */}
                    {profileOpen && (
                        <div className="absolute right-0 top-full mt-2 w-60 glass rounded-2xl overflow-hidden shadow-2xl border border-white/5 z-50 fade-in">
                            {/* Profile info header */}
                            <div className="flex items-center gap-3 px-4 py-4 border-b border-white/5">
                                <div className="w-10 h-10 rounded-full overflow-hidden flex-shrink-0 ring-2 ring-orange-500/30">
                                    {avatarUrl
                                        ? <img src={avatarUrl} alt={displayName} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                                        : <div className="w-full h-full bg-orange-500 flex items-center justify-center text-white font-bold text-sm font-display">{initials}</div>
                                    }
                                </div>
                                <div className="min-w-0">
                                    <p className="text-white text-sm font-semibold font-display truncate">{displayName}</p>
                                    {email && <p className="text-slate-500 text-xs truncate">{email}</p>}
                                </div>
                            </div>
                            {/* Report a user */}
                            <button
                                onClick={() => { setProfileOpen(false); setReportUserOpen(true); }}
                                className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-400 hover:text-orange-400 hover:bg-orange-500/5 transition-all border-b border-white/5"
                            >
                                🚩 Report a User
                            </button>

                            {/* VAR Room — visible only to mods/admins (server re-verifies on open) */}
                            {(userRole === 'moderator' || userRole === 'admin') && (
                                <button
                                    onClick={() => { setProfileOpen(false); setVarRoomOpen(true); }}
                                    className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-400 hover:text-orange-400 hover:bg-orange-500/5 transition-all border-b border-white/5"
                                >
                                    🏟️ VAR Room{userRole === 'moderator' ? ' Lite' : ''}
                                </button>
                            )}

                            {/* Sign out */}
                            <button
                                onClick={() => { setProfileOpen(false); window.siuuSignOut(); }}
                                className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-400 hover:text-red-400 hover:bg-red-500/5 transition-all"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={1.75}>
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                </svg>
                                Sign out
                            </button>

                            {/* Support */}
                            <a
                                href="https://mail.google.com/mail/?view=cm&to=support@siuustudio.com"
                                target="_blank"
                                rel="noopener noreferrer"
                                onClick={() => setProfileOpen(false)}
                                className="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-400 hover:text-blue-400 hover:bg-blue-500/5 transition-all"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={1.75}>
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" />
                                </svg>
                                Support
                            </a>
                        </div>
                    )}
                </div>
            </header>
        );
    };

    const ContentRouter = () => {
        const { activeTab } = useStore();
        switch(activeTab) {
            case 'dashboard': return <IdeaGenerator />;
            case 'hook': return <HookAnalyzer />;
            case 'thumbnail': return <ThumbnailLab />;
            case 'shots': return <ShotPlanner />;
            case 'editing': return <EditingGuide />;
            case 'script': return <ScriptWriter />;
            case 'captions': return <CaptionGenerator />;
            case 'trends': return <TrendAnalyzer />;
            case 'calendar': return <ContentCalendar />;
            case 'projects': return <Projects />;
            default: return <IdeaGenerator />;
        }
    };

    const App = () => {
        console.log('[App] rendering...');
        const { banInfo, banCheckDone } = useStore();

        // Full-app takeover while a ban check is pending or active — blocks
        // access to everything else, including the VAR Room / RPCs.
        if (!banCheckDone) return (
            <div style={{ minHeight: '100vh', background: 'var(--bg)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '16px' }}>
                <div style={{ width: '40px', height: '40px', border: '3px solid rgba(249,115,22,0.2)', borderTop: '3px solid #f97316', borderRadius: '50%', animation: 'spin 1s linear infinite' }} />
                <p style={{ color: '#64748b', fontSize: '14px', fontFamily: 'DM Sans, sans-serif' }}>Loading SIUU Studio…</p>
            </div>
        );
        if (banInfo) return (<><BanScreen /><LegalModal /></>);

        return (
            <div className="min-h-screen bg-[var(--bg)] flex">
                <Sidebar />
                <div className="flex-1 flex flex-col min-w-0">
                    <Header />
                    <main className="flex-1 overflow-auto flex flex-col">
                        <div className="w-full max-w-4xl mx-auto p-6 lg:p-8 flex-1">
                            <ContentRouter />
                        </div>
                        <Footer />
                    </main>
                </div>
                <ChatWidget />
                <LegalModal />
                <HowItWorksModal />
                <VarRoomModal />
                <ReportUserModal />
            </div>
        );
    };

    try {
        console.log('[app] Mounting React app...');
        ReactDOM.createRoot(document.getElementById('root')).render(
            <ToastProvider><StoreProvider><App /></StoreProvider></ToastProvider>
        );
        console.log('[app] React mounted successfully');
    } catch(e) {
        console.error('[app] CRASH during React mount: ' + e.message);
        if (e.stack) console.error('[app] Stack: ' + String(e.stack).slice(0, 600));
    }
</script>
</body>
</html>
