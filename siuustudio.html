    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #f97316;
            --orange-dim: rgba(249,115,22,0.15);
            --orange-glow: rgba(249,115,22,0.5);
            --bg: #0a0f1a;
            --surface: #111827;
            --surface2: #1a2234;
            --border: rgba(255,255,255,0.07);
            --text: #e2e8f0;
            --muted: #64748b;
        }
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); }
        h1, h2, h3, h4, .font-display { font-family: 'Syne', sans-serif; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .glass { background: rgba(17,24,39,0.85); backdrop-filter: blur(16px); border: 1px solid var(--border); }
        .glass-light { background: rgba(26,34,52,0.6); backdrop-filter: blur(8px); border: 1px solid var(--border); }

        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 16px var(--orange-glow); } 50% { box-shadow: 0 0 32px var(--orange-glow), 0 0 60px rgba(249,115,22,0.2); } }
        .glow-pulse { animation: pulse-glow 2s infinite; }

        @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-up { animation: slideUp 0.4s cubic-bezier(.16,1,.3,1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease; }

        .stream-cursor::after { content: '▋'; animation: blink 0.9s infinite; color: var(--orange); }
        @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }

        /* Toast */
        @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }
        .toast-enter { animation: toastIn 0.3s cubic-bezier(.16,1,.3,1); }
        .toast-exit { animation: toastOut 0.25s ease forwards; }

        /* Markdown in chat */
        .md-content strong { color: #fff; font-weight: 600; }
        .md-content em { font-style: italic; color: #94a3b8; }
        .md-content code { background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 1px 5px; font-family: 'Fira Code', monospace; font-size: 0.82em; color: #fb923c; }
        .md-content pre { background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
        .md-content pre code { background: none; border: none; padding: 0; color: #a5f3fc; }
        .md-content ul, .md-content ol { padding-left: 20px; margin: 6px 0; list-style-type: disc; }
        .md-content li { margin: 3px 0; color: #cbd5e1; }
        .md-content h1,.md-content h2,.md-content h3 { font-family: 'Syne', sans-serif; font-weight: 700; color: #fff; margin: 10px 0 4px; }
        .md-content h1 { font-size: 1.15em; }
        .md-content h2 { font-size: 1.05em; margin-top: 1.5rem; }
        .md-content h3 { font-size: 0.95em; }
        .md-content p { margin: 6px 0; line-height: 1.65; }
        .md-content blockquote { border-left: 3px solid var(--orange); padding-left: 12px; color: #94a3b8; margin: 8px 0; }
        .md-content hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 12px 0; }

        /* Sidebar active glow */
        .nav-active { background: linear-gradient(90deg, rgba(249,115,22,0.2), rgba(249,115,22,0.05)); border-left: 2px solid var(--orange); }

        /* Sidebar collapse */
        .sidebar-collapsed { transform: translateX(-100%); }
        @media (min-width: 1024px) {
            .sidebar-collapsed { transform: translateX(-240px); }
            .main-sidebar-open { margin-left: 0; }
            .main-sidebar-closed { margin-left: 0; }

            let fullContent = '';
            await this.streamChat([{ role: 'system', content: system }, ...messageHistory, { role: 'user', content: newMessage }],
                { onChunk: (_, full) => { fullContent = full; onStream?.(full); }, signal });
            return { id: crypto.randomUUID(), role: 'assistant', content: fullContent, timestamp: new Date().toISOString() };
        },
        async generateScript(ideaContext, platform, { onStream, signal } = {}) {
            const system = `You are SIUU STUDIO's elite Script Writer. Write a full, ready-to-film video script optimized for ${platform}.
Format EXACTLY:
HOOK: [Opening line — first 3 seconds]
INTRO: [Brief intro, 1-2 sentences]
SECTION 1: [Title]
CONTENT 1: [What to say/show]
SECTION 2: [Title]
CONTENT 2: [What to say/show]
SECTION 3: [Title]
CONTENT 3: [What to say/show]
CTA: [Call to action]
DURATION: [Estimated total duration]
TONE: [Tone of the video]`;

            await this.streamChat(

                { onChunk: (_, full) => { fullContent = full; onStream?.(full); }, signal }
            );
            const parse = (label) => { const m = fullContent.match(new RegExp(`^${label}:\\s*(.+)$`, 'm')); return m ? m[1].trim() : null; };
            const parseBlock = (label) => { const m = fullContent.match(new RegExp(`^${label}:\\s*([\\s\\S]*?)(?=\\n[A-Z ]+:|$)`, 'm')); return m ? m[1].trim() : null; };
            const sections = [];
            for (let i = 1; i <= 5; i++) {

                const content = parseBlock(`CONTENT ${i}`);
                if (title) sections.push({ title, content: content || '' });
            }
            return {
                id: crypto.randomUUID(),
                platform,
                hook: parse('HOOK') || 'Scroll-stopping opening...',
                intro: parse('INTRO') || '',
                sections: sections.length ? sections : [{ title: 'Main Content', content: fullContent }],
                cta: parse('CTA') || 'Follow for more!',
                duration: parse('DURATION') || '30-60 seconds',
                tone: parse('TONE') || 'Energetic',
                rawResponse: fullContent,
                createdAt: new Date().toISOString(),
            };
        },

        async generateCaptions(ideaContext, platform, { onStream, signal } = {}) {

Format EXACTLY:
CAPTION 1: [Full caption text with emojis, punchy and engaging]
HASHTAGS 1: [10-15 relevant hashtags separated by spaces]
CAPTION 2: [Alternative caption, different angle]

BEST TIME: [Best time to post for maximum reach]
HOOK WORD: [Single most powerful word to lead with]`;

            let fullContent = '';
            await this.streamChat(

                { onChunk: (_, full) => { fullContent = full; onStream?.(full); }, signal }
            );
            const parse = (label) => { const m = fullContent.match(new RegExp(`^${label}:\\s*(.+)$`, 'm')); return m ? m[1].trim() : null; };
            const captions = [];
            for (let i = 1; i <= 3; i++) {
                const caption = parse(`CAPTION ${i}`);
                const hashtags = parse(`HASHTAGS ${i}`);
                if (caption) captions.push({ caption, hashtags: hashtags || '' });
            }
            return {
                id: crypto.randomUUID(),
                platform,
                captions: captions.length ? captions : [{ caption: fullContent, hashtags: '' }],
                bestTime: parse('BEST TIME') || 'Tuesday–Friday 12pm–3pm',
                hookWord: parse('HOOK WORD') || 'POV',
                rawResponse: fullContent,

        async analyzeTrends(niche, { onStream, signal } = {}) {
            // ── Step 1: Run parallel Tavily searches for real, current data ──────
            onStream?.('🔍 Searching the web for current trends...\n\n');

            const [search1, search2, search3] = await Promise.all([
                searchWeb(`${niche} trending content creators 2026`, { maxResults: 5, signal }),
                searchWeb(`${niche} viral video trends TikTok Instagram YouTube 2026`, { maxResults: 5, signal }),
                searchWeb(`best performing ${niche} content format short-form video 2026`, { maxResults: 4, signal }),
            ]);

            // Build a readable context block from all search results
            const webContext = [
                search1.answer ? `Web Summary 1: ${search1.answer}` : '',
                search1.snippets ? `Search Results (General Trends):\n${search1.snippets}` : '',
                search2.answer ? `\nWeb Summary 2: ${search2.answer}` : '',
                search2.snippets ? `Search Results (Viral Formats):\n${search2.snippets}` : '',
                search3.answer ? `\nWeb Summary 3: ${search3.answer}` : '',
                search3.snippets ? `Search Results (Best Formats):\n${search3.snippets}` : '',
            ].filter(Boolean).join('\n\n');

            // ── Step 2: Feed real search data into Cerebras for structured analysis
            const system = `You are SIUU STUDIO's Trend Intelligence Engine with access to live web search results.
You have been given REAL, CURRENT web search data about trends in this niche. Use it to give accurate, up-to-date analysis.
Base your response on the search results provided — do NOT rely only on training data.

Format your response EXACTLY like this:
TREND 1: [Trending topic/format name — based on search results]
WHY 1: [Why it's working right now — cite what you found]
ANGLE 1: [Specific content angle for this niche]
TREND 2: [Trending topic/format name]
WHY 2: [Why it's working]
ANGLE 2: [Specific angle]
TREND 3: [Trending topic/format name]
WHY 3: [Why it's working]
ANGLE 3: [Specific angle]
TREND 4: [Trending topic/format name]
WHY 4: [Why it's working]
ANGLE 4: [Specific angle]
TREND 5: [Trending topic/format name]
WHY 5: [Why it's working]
ANGLE 5: [Specific angle]
TOP FORMAT: [The single best-performing video format right now based on search data]
AVOID: [What to avoid — 1 sentence based on what's declining]
SOURCES USED: [Brief note on what the web search revealed]`;

            const userMessage = webContext
                ? `Analyze current trends for the niche: "${niche}"\n\nHere is LIVE web search data to base your analysis on:\n\n${webContext}`
                : `Analyze current trends for the niche: "${niche}" (no live web data available, use best knowledge)`;

            let fullContent = '';
            await this.streamChat(
                [{ role: 'system', content: system }, { role: 'user', content: userMessage }],
                { onChunk: (_, full) => { fullContent = full; onStream?.(full); }, signal }
            );

            const parse = (label) => { const m = fullContent.match(new RegExp(`^${label}:\\s*(.+)$`, 'm')); return m ? m[1].trim() : null; };
            const trends = [];
            for (let i = 1; i <= 5; i++) {
                const name = parse(`TREND ${i}`);
                const why = parse(`WHY ${i}`);
                const angle = parse(`ANGLE ${i}`);
                if (name) trends.push({ name, why: why || '', angle: angle || '' });
            }
            return {
                id: crypto.randomUUID(),
                niche,
                trends: trends.length ? trends : [{ name: 'Authentic BTS content', why: 'Audiences crave realness', angle: 'Show your process unfiltered' }],
                topFormat: parse('TOP FORMAT') || 'Quick-cut tutorials',
                avoid: parse('AVOID') || 'Overly polished, scripted content',
                sourcesUsed: parse('SOURCES USED') || null,
                webSearched: !!(search1.snippets || search2.snippets),
                rawResponse: fullContent,
                createdAt: new Date().toISOString(),
            };
        },

        async generateCalendar(niche, postsPerWeek, { onStream, signal } = {}) {
            const system = `You are SIUU STUDIO's Content Strategist. Build a 4-week content calendar for a creator posting ${postsPerWeek}x per week.
Format EXACTLY — repeat this block for every post:
POST [N]: [Content idea/title]
DAY [N]: [Day of week]
FORMAT [N]: [Reel/TikTok/YouTube Short/Story/Carousel]
PLATFORM [N]: [Best platform]
HOOK [N]: [Opening hook line]
GOAL [N]: [Awareness/Engagement/Conversion/Retention]

After all posts add:
WEEKLY THEME 1: [Week 1 theme]
WEEKLY THEME 2: [Week 2 theme]
WEEKLY THEME 3: [Week 3 theme]
WEEKLY THEME 4: [Week 4 theme]
STRATEGY TIP: [One key strategic tip for this niche]`;

            const totalPosts = postsPerWeek * 4;
            let fullContent = '';
            await this.streamChat(
                [{ role: 'system', content: system }, { role: 'user', content: `Create a ${totalPosts}-post content calendar for: ${niche}` }],
                { onChunk: (_, full) => { fullContent = full; onStream?.(full); }, signal }
            );
            const parse = (label) => { const m = fullContent.match(new RegExp(`^${label}:\\s*(.+)$`, 'm')); return m ? m[1].trim() : null; };
            const posts = [];
            for (let i = 1; i <= totalPosts; i++) {
                const title = parse(`POST ${i}`);
                if (title) posts.push({
                    id: crypto.randomUUID(),
                    title,
                    day: parse(`DAY ${i}`) || 'Monday',
                    format: parse(`FORMAT ${i}`) || 'Reel',
                    platform: parse(`PLATFORM ${i}`) || 'TikTok/Instagram',
                    hook: parse(`HOOK ${i}`) || '',
                    goal: parse(`GOAL ${i}`) || 'Engagement',
                    week: Math.ceil(i / postsPerWeek),
                });
            }
            const weeklyThemes = [1,2,3,4].map(w => parse(`WEEKLY THEME ${w}`)).filter(Boolean);
            return {
                id: crypto.randomUUID(),
                niche,
                postsPerWeek,
                posts: posts.length ? posts : [],
                weeklyThemes,
                strategyTip: parse('STRATEGY TIP') || 'Consistency beats perfection.',
                rawResponse: fullContent,
                createdAt: new Date().toISOString(),
            };
        },

    }; // end returned service object
    }; // end createGenerationService

    // ─── Store ───────────────────────────────────────────────────────────────────
    const StoreContext = createContext(null);

    const StoreProvider = ({ children }) => {
        console.log('[StoreProvider] initialising...');
        const [activeTab, setActiveTab] = useState('dashboard');
        const [activeProvider, setActiveProvider] = useState(DEFAULT_PROVIDER);
        // ─── Projects: Supabase is the single source of truth ────────────────────
        // SQL to run ONCE in Supabase SQL Editor:
        // (If table already exists: ALTER TABLE projects ADD COLUMN IF NOT EXISTS script jsonb; ADD COLUMN IF NOT EXISTS captions jsonb;)
        //
        //   create table if not exists projects (
        //     id            uuid primary key,
        //     user_id       uuid references auth.users(id) on delete cascade not null,
        //     name          text not null,
        //     created_at    timestamptz default now(),
        //     updated_at    timestamptz default now(),
        //     idea          jsonb,
        //     shot_plan     jsonb,
        //     editing_guide jsonb,
        //     hook_analysis jsonb,
        //     thumbnail_data jsonb,
        //     script        jsonb,
        //     captions      jsonb
        //   );
        //   alter table projects enable row level security;
        //   create policy "owner_all" on projects for all
        //     using (auth.uid() = user_id) with check (auth.uid() = user_id);
        //
        const [projects, setProjects] = useState([]);
        const [projectsLoaded, setProjectsLoaded] = useState(false);

        // Active Project State
        const [currentProject, setCurrentProject] = useState(null);
        const [currentIdea, setCurrentIdea] = useState(null);
        const [currentShotPlan, setCurrentShotPlan] = useState(null);
        const [currentEditingGuide, setCurrentEditingGuide] = useState(null);
        const [currentHookAnalysis, setCurrentHookAnalysis] = useState(null);
        const [currentThumbnailData, setCurrentThumbnailData] = useState(null);
        const [currentScript, setCurrentScript] = useState(null);
        const [currentCaptions, setCurrentCaptions] = useState(null);
        const [currentTrends, setCurrentTrends] = useState(null);
        const [currentCalendar, setCurrentCalendar] = useState(null);

        const [isGenerating, setIsGenerating] = useState(false);
        const [streamContent, setStreamContent] = useState('');
        const [chatOpen, setChatOpen] = useState(false);
        const [chatMessages, setChatMessages] = useState([
            { id: 'init', role: 'assistant', content: 'SIUUU! 🏆 I\'m your AI Coach powered by **SIUU AI**! Ask me anything about video creation, editing, VFX, or viral content strategy.' }
        ]);
        const [sidebarOpen, setSidebarOpen] = useState(true);
        const [howItWorksOpen, setHowItWorksOpen] = useState(false);
        const [currentUser, setCurrentUser] = useState(() => window._sbUser ?? null);
        const [legalModal, setLegalModal] = useState(null); // 'tos' | 'privacy' | null
        const [legalPendingAck, setLegalPendingAck] = useState(false); // true = auto-shown for acknowledgment
        const [legalAckQueue, setLegalAckQueue] = useState([]); // remaining docs to ack
        const [userRole, setUserRole] = useState('user');       // 'user' | 'moderator' | 'admin'
        const [banInfo, setBanInfo] = useState(null);            // { tier, reason, custom_message, expires_at, appealable } | null
        const [banCheckDone, setBanCheckDone] = useState(false); // gate rendering until first ban-check completes
        const [varRoomOpen, setVarRoomOpen] = useState(false);
        const [reportUserOpen, setReportUserOpen] = useState(false);
        const abortRef = useRef(null);

        // On mount: fetch live user metadata from Supabase server (not cached JWT).
        // getUser() hits the Auth server so it always reflects the latest saved metadata.
        useEffect(() => {
            (async () => {
                try {
                    const { data: { user }, error } = await window._sb.auth.getUser();
                    if (error || !user) return;
                    window._sbUser = user; // keep in sync
                    setCurrentUser(user);

                    // Fetch this user's role from profiles (RLS: own row always readable)
                    try {
                        const { data: profile } = await window._sb
                            .from('profiles')
                            .select('role')
                            .eq('id', user.id)
                            .single();
                        if (profile?.role) setUserRole(profile.role);
                    } catch (e) {
                        console.warn('Could not fetch role:', e);
                    }

                    const meta  = user.user_metadata ?? {};
                    const queue = [];
                    if (!meta.tos_acknowledged)     queue.push('tos');
                    if (!meta.privacy_acknowledged) queue.push('privacy');
                    if (queue.length > 0) {
                        const [first, ...rest] = queue;
                        setLegalAckQueue(rest);
                        setLegalPendingAck(true);
                        setLegalModal(first);
                    }
                } catch (e) {
                    console.warn('Could not fetch user for legal check:', e);
                }
            })();
        }, []);


        // On mount: run the ban-check edge function. This catches IP / device
        // fingerprint bans (tiers 5-6) even for brand-new accounts, and also
        // surfaces normal per-account bans (tiers 1-4) via the same call.
        // A 6-second timeout ensures a hung function never causes a permanent black screen.
        useEffect(() => {
            const unlock = () => {
                // Always unlock the UI and remove the pre-React loader.
                // Nothing should ever cause a permanent black screen.
                console.log('[ban-check] unlock() called — setting banCheckDone=true');
                setBanCheckDone(true);
                const loader = document.getElementById('pre-root-loader');
                if (loader) loader.remove();
            };
            (async () => {
                console.log('[ban-check] starting');
                const timeout = new Promise(resolve => setTimeout(() => resolve({ timedOut: true }), 6000));
                try {
                    console.log('[ban-check] getting fingerprint...');
                    const fingerprint = await Promise.race([getDeviceFingerprint(), new Promise(r => setTimeout(() => r(null), 2000))]);
                    console.log('[ban-check] fingerprint:', fingerprint ? 'ok' : 'null');

                    console.log('[ban-check] getting session...');
                    const { data: { session }, error: sessErr } = await window._sb.auth.getSession();
                    console.log('[ban-check] session:', session ? 'found' : 'null', sessErr ? 'err:' + sessErr.message : '');

                    console.log('[ban-check] fetching /api/ban-check...');
                    const fetchBan = fetch('/api/ban-check', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            ...(session?.access_token ? { Authorization: `Bearer ${session.access_token}` } : {}),
                        },
                        body: JSON.stringify({ fingerprint }),
                    }).then(async r => {
                        console.log('[ban-check] /api/ban-check response status:', r.status);
                        const text = await r.text();
                        console.log('[ban-check] /api/ban-check raw response:', text.slice(0, 300));
                        try { return JSON.parse(text); } catch(e) { return { banned: false, _parseError: text.slice(0, 200) }; }
                    }).catch(e => {
                        console.error('[ban-check] fetch error:', e.message);
                        return { banned: false };
                    });

                    const data = await Promise.race([fetchBan, timeout]);
                    console.log('[ban-check] result:', JSON.stringify(data));

                    if (data?.timedOut) {
                        console.warn('[ban-check] timed out after 6s — allowing access');
                    } else {
                        if (data?.banned) setBanInfo(data);
                        else if (data?.lifted) setBanInfo(data);
                    }
                } catch (e) {
                    console.error('[ban-check] caught error:', e.message, e.stack);
                } finally {
                    unlock();
                }
            })().catch(e => {
                console.error('[ban-check] outer catch:', e.message, e.stack);
                unlock();
            });
        }, []);

        // ── Supabase DB helpers ───────────────────────────────────────────────────
        const getUserId = async () => {
            if (window._sbUser?.id) return window._sbUser.id;
            const { data: { session } } = await window._sb.auth.getSession();
            if (session?.user?.id) { window._sbUser = session.user; return session.user.id; }
            return null;
        };

        // toDb is synchronous — caller must resolve userId first and pass it in
        const toDb = (p, userId) => ({
            id:             p.id,
            user_id:        userId,
            name:           p.name,
            created_at:     p.createdAt,
            updated_at:     p.updatedAt,
            idea:           p.idea           ?? null,
            shot_plan:      p.shotPlan       ?? null,
            editing_guide:  p.editingGuide   ?? null,
            hook_analysis:  p.hookAnalysis   ?? null,
            thumbnail_data: p.thumbnailData  ?? null,
            script:         p.script         ?? null,
            captions:       p.captions       ?? null,
        });

        const fromDb = (row) => ({
            id:            row.id,
            name:          row.name,
            createdAt:     row.created_at,
            updatedAt:     row.updated_at,
            idea:          row.idea           ?? null,
            shotPlan:      row.shot_plan      ?? null,
            editingGuide:  row.editing_guide  ?? null,
            hookAnalysis:  row.hook_analysis  ?? null,
            thumbnailData: row.thumbnail_data ?? null,
            script:        row.script         ?? null,
            captions:      row.captions       ?? null,
        });

        // ── Load projects from Supabase on mount ──────────────────────────────────
        useEffect(() => {
            (async () => {
                try {
                    const { data, error } = await window._sb
                        .from('projects')
                        .select('*')
                        .order('created_at', { ascending: true });
                    if (error) throw error;
                    const loaded = (data || []).map(fromDb);
                    setProjects(loaded);
                } catch (e) {
                    console.error('[SIUU] Load projects failed:', e.message);
                } finally {
                    setProjectsLoaded(true);
                }
            })();
        }, []);

        // ── Debounced Supabase upsert (avoids hammering DB during AI streaming) ───
        const dbSaveTimers = useRef({});
        const dbSave = useRef(null);
        dbSave.current = (project) => {
            clearTimeout(dbSaveTimers.current[project.id]);
            dbSaveTimers.current[project.id] = setTimeout(async () => {
                try {
                    const userId = await getUserId();
                    if (!userId) { console.error('[SIUU] dbSave: no user ID'); return; }
                    const { error } = await window._sb
                        .from('projects')
                        .upsert(toDb(project, userId), { onConflict: 'id' });
                    if (error) console.error('[SIUU] DB upsert failed:', error.message, error);
                } catch (e) {
                    console.error('[SIUU] DB save error:', e.message);
                }
            }, 600);
        };

        const api = useMemo(() => createGenerationService(activeProvider), [activeProvider]);
        const cancelGeneration = () => { abortRef.current?.abort(); };

        const generateId = () => (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);

        const createProject = (name, autoLoad = true) => {
            if (!name.trim()) return;
            const p = {
                id: generateId(), name,
                createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
                idea: null, shotPlan: null, editingGuide: null, hookAnalysis: null, thumbnailData: null
            };
            setProjects(prev => [...prev, p]);
            // Immediate insert — no need to debounce a brand-new row
            (async () => {
                try {
                    const userId = await getUserId();
                    if (!userId) { console.error('[SIUU] createProject: no user ID — insert skipped'); return; }
                    const row = toDb(p, userId);
                    console.log('[SIUU] Inserting project:', row);
                    const { error } = await window._sb.from('projects').insert(row);
                    if (error) console.error('[SIUU] DB insert failed:', error.message, error);
                    else console.log('[SIUU] Project saved to Supabase ✓');
                } catch (e) {
                    console.error('[SIUU] DB insert error:', e.message);
                }
            })();
            if (autoLoad) {
                loadProject(p);
            } else {
                setCurrentProject(p);
                setCurrentIdea(null); setCurrentShotPlan(null);
                setCurrentEditingGuide(null); setCurrentHookAnalysis(null);
                setCurrentThumbnailData(null);
            }
            return p;
        };

        const updateProject = (id, updates) => {
            const now = new Date().toISOString();
            setProjects(prev => prev.map(p => {
                if (p.id !== id) return p;
                const updated = { ...p, ...updates, updatedAt: now };
                dbSave.current(updated); // debounced write to Supabase
                return updated;
            }));
            setCurrentProject(prev => {
                if (prev?.id !== id) return prev;
                return { ...prev, ...updates, updatedAt: now };
            });
        };

        const loadProject = (project) => {
            setCurrentProject(project);
            setCurrentIdea(project.idea || null);
            setCurrentShotPlan(project.shotPlan || null);
            setCurrentEditingGuide(project.editingGuide || null);
            setCurrentHookAnalysis(project.hookAnalysis || null);
            setCurrentThumbnailData(project.thumbnailData || null);
            setCurrentScript(project.script || null);
            setCurrentCaptions(project.captions || null);
            setActiveTab('dashboard');
        };

        const clearActiveProject = () => {
            setCurrentProject(null);
            setCurrentIdea(null); setCurrentShotPlan(null);
            setCurrentEditingGuide(null); setCurrentHookAnalysis(null);
            setCurrentThumbnailData(null); setCurrentScript(null);
            setCurrentCaptions(null);
            setActiveTab('projects');
        };

        const deleteProject = (id) => {
            setProjects(prev => prev.filter(p => p.id !== id));
            if (currentProject?.id === id) clearActiveProject();
            (async () => {
                try {
                    const { error } = await window._sb.from('projects').delete().eq('id', id);
                    if (error) console.warn('DB delete failed:', error.message);
                } catch (e) {
                    console.warn('DB delete error:', e.message);
                }
            })();
        };

        const addChatMessage = (msg) => setChatMessages(prev => [...prev, msg]);

        return (
            <StoreContext.Provider value={{
                api,
                activeTab, setActiveTab,
                activeProvider, setActiveProvider,
                projects, currentProject, setCurrentProject, clearActiveProject,
                currentIdea, setCurrentIdea,
                currentShotPlan, setCurrentShotPlan,
                currentEditingGuide, setCurrentEditingGuide,
                currentHookAnalysis, setCurrentHookAnalysis,
                currentThumbnailData, setCurrentThumbnailData,
                currentScript, setCurrentScript,
                currentCaptions, setCurrentCaptions,
                currentTrends, setCurrentTrends,
                currentCalendar, setCurrentCalendar,
                isGenerating, setIsGenerating,
                streamContent, setStreamContent,
                chatOpen, setChatOpen,
                chatMessages, setChatMessages, addChatMessage,
                sidebarOpen, setSidebarOpen,
                howItWorksOpen, setHowItWorksOpen,
                currentUser,
                userRole, setUserRole,
                banInfo, setBanInfo, banCheckDone,
                varRoomOpen, setVarRoomOpen,
                reportUserOpen, setReportUserOpen,
                legalModal, setLegalModal,
                legalPendingAck, setLegalPendingAck,
                legalAckQueue, setLegalAckQueue,
                projectsLoaded,
                createProject, updateProject, loadProject, deleteProject,
                abortRef, cancelGeneration,
            }}>
                {children}
            </StoreContext.Provider>
        );

    // ─── UI Primitives ───────────────────────────────────────────────────────────
    const Btn = ({ children, onClick, variant = 'primary', className = '', disabled = false, icon, size = 'md' }) => {
        const v = {
            primary: 'bg-orange-500 hover:bg-orange-600 text-white shadow-lg shadow-orange-500/20',

    const Card = ({ children, className = '', title, subtitle, action }) => (
        <div className={`glass rounded-2xl overflow-hidden ${className}`}>
            {(title || subtitle || action) && (
                <div className="px-6 py-4 border-b border-white/5 flex items-center justify-between">

    const StreamBox = ({ content, label = 'AI is working...' }) => (
        <Card className="slide-up">

    const EmptyState = ({ icon, title, description, action }) => (
        <Card className="text-center py-16">
            <div className="w-14 h-14 rounded-2xl bg-slate-800 flex items-center justify-center mx-auto mb-4">
                <Icon path={I[icon]} className="w-7 h-7 text-slate-600" />
            </div>
            <h3 className="text-lg font-semibold text-white mb-2 font-display">{title}</h3>
            <p className="text-slate-500 text-sm max-w-xs mx-auto mb-6">{description}</p>
            {action}
        </Card>
    );

    // ─── How It Works Modal ──────────────────────────────────────────────────────
    const HowItWorksModal = () => {
        const { howItWorksOpen, setHowItWorksOpen } = useStore();
        if (!howItWorksOpen) return null;
        return (
            <div className="settings-overlay fade-in" onClick={() => setHowItWorksOpen(false)}>
                <div className="glass rounded-2xl p-7 max-w-lg w-full mx-4 slide-up" onClick={e => e.stopPropagation()}>
                    <div className="flex items-center justify-between mb-5">
                        <h2 className="text-white font-display font-bold text-lg flex items-center gap-2">
                            <span className="text-orange-400">ⓘ</span> How does SIUU Studio work?
                        </h2>
                        <button onClick={() => setHowItWorksOpen(false)} className="text-slate-500 hover:text-white transition-colors text-xl leading-none">&times;</button>
                    </div>

                    <div className="space-y-4 text-sm text-slate-300 leading-relaxed">
                        <div className="bg-slate-800/60 border border-white/5 rounded-xl p-4 space-y-2">
                            <h3 className="text-white font-semibold font-display text-xs uppercase tracking-wider text-orange-400 mb-2">⚡ The AI Engine</h3>
                            <p>Your input is processed by a large language model (LLM) running on <span className="text-white font-medium">Cerebras</span> infrastructure — one of the fastest AI inference platforms available. Responses stream back to you in real time as they're generated.</p>
                        </div>

                        <div className="bg-slate-800/60 border border-white/5 rounded-xl p-4 space-y-2">
                            <h3 className="text-orange-400 font-semibold font-display text-xs uppercase tracking-wider mb-2">🔍 Trend-Aware Features</h3>
                            <p>Tools like the <span className="text-white font-medium">Trend Analyzer</span> and <span className="text-white font-medium">Content Calendar</span> pull live web search results before generating suggestions, grounding the AI's output in what's currently happening on social platforms.</p>
                        </div>

                        <div className="bg-slate-800/60 border border-white/5 rounded-xl p-4 space-y-2">
                            <h3 className="text-orange-400 font-semibold font-display text-xs uppercase tracking-wider mb-2">🏗️ How a Request Flows</h3>
                            <p>When you submit a topic or input, SIUU Studio sends it through a content strategy system tailored for short-form creators. The model evaluates your input against patterns in high-performing content and returns a structured result — a script, hook score, caption set, and so on — depending on the tool.</p>
                        </div>

                        <div className="border border-yellow-500/20 bg-yellow-500/5 rounded-xl p-4">
                            <p className="text-yellow-300 text-xs font-semibold uppercase tracking-wider mb-1">⚠️ Important</p>
                            <p className="text-slate-400 text-xs">All output is AI-generated and reflects the model's pattern recognition — <span className="text-white">not guaranteed facts, verified statistics, or professional editorial advice.</span> Always review, fact-check, and adapt any suggestions to your own voice before publishing.</p>

                    <button onClick={() => setHowItWorksOpen(false)} className="mt-6 w-full py-2.5 rounded-xl bg-orange-500 hover:bg-orange-600 transition-colors text-white font-semibold text-sm font-display">

                    </button>

    const HowItWorksButton = () => {
        const { setHowItWorksOpen } = useStore();
        return (
            <button
                onClick={() => setHowItWorksOpen(true)}
                className="text-slate-500 hover:text-orange-400 underline underline-offset-2 transition-colors"
            >
                ⓘ How does this work?
            </button>
        );
