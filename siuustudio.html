    // ─── RBAC / Ban System ──────────────────────────────────────────────────────
    const BAN_TIER_LABELS = {
        '1day':     '1-Day Ban',
        '1week':    '1-Week Ban',
        '1month':   '1-Month Ban',
        permanent:  'Permanent Ban',
        ip:         'IP Ban',
        hwid_ip:    'Hardware Fingerprint + IP Ban',
    };
    const MOD_BAN_TIERS   = ['1day', '1week'];
    const ADMIN_BAN_TIERS = ['1day', '1week', '1month', 'permanent', 'ip', 'hwid_ip'];

    const ROLE_BADGES = {
        user:      { label: 'User',      className: 'bg-slate-700/60 text-slate-300' },
        moderator: { label: 'Moderator', className: 'bg-blue-500/15 text-blue-400 border border-blue-500/20' },
        admin:     { label: 'Admin',     className: 'bg-orange-500/15 text-orange-400 border border-orange-500/20' },
    };
    const RoleBadge = ({ role }) => {
        const b = ROLE_BADGES[role] || ROLE_BADGES.user;
        return <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full ${b.className}`}>{b.label}</span>;
    };

    // ─── Ban Screen (full-app takeover when banned) ─────────────────────────────
    const BanScreen = () => {
        const { banInfo, setBanInfo, setLegalModal } = useStore();
        const [lifted, setLifted] = useState(() => !!banInfo?.lifted);
        const [agreed, setAgreed] = useState(false);
        const [reactivating, setReactivating] = useState(false);

        // Unique fingerprint for this specific ban (its row id), used to
        // remember whether the user already went through the reactivation
        // flow for it. Falls back to a derived key only if id is missing
        // (e.g. older cached responses).
        const banKey = banInfo
            ? (banInfo.id || [banInfo.tier, banInfo.expires_at || 'permanent', banInfo.custom_message || ''].join('|'))
            : null;

        // Capture this ONCE when the ban screen first mounts. Re-deriving it
        // on every render means a metadata write that happens server-side
        // *during* the unban (e.g. the unban RPC touching user_metadata) can
        // retroactively flip this to true and skip straight back to the app
        // before the "ban lifted" screen ever has a chance to render.
        const alreadyReactivatedRef = useRef(
            banKey && window._sbUser?.user_metadata?.ban_reactivated_for === banKey
        );
        const alreadyReactivated = alreadyReactivatedRef.current;

        // Periodically re-check ban status. Once the server says we're no
        // longer banned (expired or admin lifted it), switch to the
        // reactivation screen instead of silently returning to normal —
        // unless we've already shown it once for this exact ban.
        useEffect(() => {
            if (!banInfo) return;
            if (banInfo.lifted) return; // already showing the reactivation screen; no active ban to poll
            if (alreadyReactivated) {
                setBanInfo(null);
                return;
            }
            let cancelled = false;

            const check = async () => {
                try {
                    const fingerprint = await getDeviceFingerprint();
                    const { data: { session } } = await window._sb.auth.getSession();
                    const res = await fetch('/api/ban-check', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            ...(session?.access_token ? { Authorization: 'Bearer ' + session.access_token } : {}),
                        },
                        body: JSON.stringify({ fingerprint }),
                    });
                    const data = await res.json().catch(() => ({ banned: true }));
                    if (!cancelled && !data?.banned) setLifted(true);
                } catch (e) {
                    console.warn('Ban re-check failed:', e);
                }
            };

            check();
            const interval = setInterval(check, 15000);
            return () => { cancelled = true; clearInterval(interval); };
        }, [banInfo, alreadyReactivated]);

        if (!banInfo) return null;
        if (alreadyReactivated && !lifted) return null;
        const expiresText = banInfo.expires_at ? new Date(banInfo.expires_at).toLocaleString() : null;

        const handleReactivate = async () => {
            if (!agreed || reactivating) return;
            setReactivating(true);
            try {
                await window._sb.auth.updateUser({
                    data: {
                        tos_acknowledged: true,
                        tos_acknowledged_at: new Date().toISOString(),
                        privacy_acknowledged: true,
                        privacy_acknowledged_at: new Date().toISOString(),
                        ban_reactivated_for: banKey,
                    }
                });
                if (window._sbUser) {
                    window._sbUser.user_metadata = {
                        ...(window._sbUser.user_metadata ?? {}),
                        tos_acknowledged: true,
                        privacy_acknowledged: true,
                        ban_reactivated_for: banKey,
                    };
                }
            } catch (e) {
                console.warn('Could not save acknowledgment:', e);
            }
            setBanInfo(null);
        };

        if (lifted) {
            return (
                <div className="min-h-screen bg-[var(--bg)] flex items-center justify-center p-6">
                    <div className="glass rounded-3xl p-8 max-w-md w-full text-center border border-green-500/20 fade-in">
                        <div className="text-5xl mb-4">✅</div>
                        <h1 className="text-2xl font-display font-bold text-white mb-2">Your ban has ended</h1>
                        <p className="text-slate-400 text-sm mb-6">
                            Welcome back! Before you continue, please review and agree to our policies to reactivate your account.
                        </p>
                        <label className="flex items-start gap-3 text-left mb-6 cursor-pointer">
                            <input
                                type="checkbox"
                                checked={agreed}
                                onChange={(e) => setAgreed(e.target.checked)}
                                className="mt-1 w-4 h-4 accent-orange-500 cursor-pointer"
                            />
                            <span className="text-sm text-slate-300">
                                I agree to reactivate my account and agree to the{' '}
                                <button type="button" onClick={() => setLegalModal('tos')} className="text-orange-400 underline hover:text-orange-300">
                                    Terms of Service
                                </button>
                                {' '}and{' '}
                                <button type="button" onClick={() => setLegalModal('privacy')} className="text-orange-400 underline hover:text-orange-300">
                                    Privacy Policy
                                </button>.
                            </span>
                        </label>
                        <button
                            onClick={handleReactivate}
                            disabled={!agreed || reactivating}
                            className="w-full py-3 rounded-xl bg-orange-500 text-white font-display font-semibold disabled:opacity-40 disabled:cursor-not-allowed hover:bg-orange-400 transition-colors"
                        >
                            {reactivating ? 'Reactivating…' : 'Reactivate Account'}
                        </button>
                        <button onClick={() => window.siuuSignOut()} className="mt-4 text-xs text-slate-500 hover:text-white underline transition-colors">
                            Sign out
                        </button>
                    </div>
                </div>
            );
        }

        return (
            <div className="min-h-screen bg-[var(--bg)] flex items-center justify-center p-6">
                <div className="glass rounded-3xl p-8 max-w-md w-full text-center border border-red-500/20 fade-in">
                    <div className="text-5xl mb-4">🔨</div>
                    <h1 className="text-2xl font-display font-bold text-white mb-2">The Ban Hammer has been spoken!</h1>
                    <p className="inline-block px-3 py-1 rounded-full bg-red-500/10 text-red-400 text-sm font-semibold font-display mb-4">
                        {BAN_TIER_LABELS[banInfo.tier] || banInfo.tier}
                    </p>
                    {banInfo.custom_message && (
                        <div className="bg-slate-800/60 border border-white/5 rounded-xl p-4 mb-4 text-left">
                            <p className="text-xs uppercase tracking-wider text-slate-500 mb-1">Reason</p>
                            <p className="text-slate-300 text-sm">{banInfo.custom_message}</p>
                        </div>
                    )}
                    {expiresText && (
                        <p className="text-slate-500 text-xs mb-4">This ban lifts on <span className="text-slate-300">{expiresText}</span></p>
                    )}
                    {banInfo.appealable ? (
                        <p className="text-slate-400 text-sm leading-relaxed">
                            If you believe this was a mistake, you can appeal by emailing{' '}
                            <a href="mailto:support@siuustudio.com" className="text-orange-400 underline">support@siuustudio.com</a>.
                        </p>
                    ) : (
                        <p className="text-slate-500 text-sm">This action is final and cannot be appealed.</p>
                    )}
                    <button onClick={() => window.siuuSignOut()} className="mt-6 text-xs text-slate-500 hover:text-white underline transition-colors">
                        Sign out
                    </button>
                </div>
            </div>
        );
    };

    // ─── Report a User Modal ─────────────────────────────────────────────────────
    const REPORT_REASONS = ['Spam', 'Harassment', 'Inappropriate Content', 'Impersonation', 'Other'];

    const ReportUserModal = () => {
        const { reportUserOpen, setReportUserOpen } = useStore();
        const { toast } = useToast();
        const [email, setEmail] = useState('');
        const [reason, setReason] = useState(REPORT_REASONS[0]);
        const [details, setDetails] = useState('');
        const [submitting, setSubmitting] = useState(false);

        if (!reportUserOpen) return null;

        const submit = async () => {
            if (!email.trim()) { toast("Enter the user's email", 'warning'); return; }
            setSubmitting(true);
            try {
                const { error } = await window._sb.rpc('submit_report', {
                    p_reported_email: email.trim(),
                    p_reason: reason,
                    p_details: details.trim() || null,
                });
                if (error) throw error;
                toast('Report submitted — our moderators will review it.', 'success');
                setEmail(''); setDetails(''); setReason(REPORT_REASONS[0]);
                setReportUserOpen(false);
            } catch (e) {
                toast('Could not submit report: ' + e.message, 'error');
            } finally {
                setSubmitting(false);
            }
        };

        return (
            <div className="settings-overlay fade-in" onClick={() => setReportUserOpen(false)}>
                <div className="glass rounded-2xl p-7 max-w-md w-full mx-4 slide-up" onClick={e => e.stopPropagation()}>
                    <div className="flex items-center justify-between mb-5">
                        <h2 className="text-white font-display font-bold text-lg">🚩 Report a User</h2>
                        <button onClick={() => setReportUserOpen(false)} className="text-slate-500 hover:text-white text-xl leading-none">&times;</button>
                    </div>
                    <div className="space-y-4">
                        <div>
                            <label className="text-xs text-slate-400 font-medium mb-1.5 block">User's email</label>
                            <input value={email} onChange={e => setEmail(e.target.value)} type="email" placeholder="user@example.com"
                                className="w-full bg-slate-800/60 border border-white/5 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-500/50" />
                        </div>
                        <div>
                            <label className="text-xs text-slate-400 font-medium mb-1.5 block">Reason</label>
                            <select value={reason} onChange={e => setReason(e.target.value)}
                                className="w-full bg-slate-800/60 border border-white/5 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-orange-500/50">
                                {REPORT_REASONS.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-xs text-slate-400 font-medium mb-1.5 block">Details (optional)</label>
                            <textarea value={details} onChange={e => setDetails(e.target.value)} rows={3} placeholder="What happened?"
                                className="w-full bg-slate-800/60 border border-white/5 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-500/50 resize-none" />
                        </div>
                    </div>
                    <button onClick={submit} disabled={submitting}
                        className="mt-6 w-full py-2.5 rounded-xl bg-orange-500 hover:bg-orange-600 disabled:opacity-50 transition-colors text-white font-semibold text-sm font-display">
                        {submitting ? 'Submitting...' : 'Submit Report'}
                    </button>
                </div>
            </div>
        );
    };

    // ─── Ban Action Panel — shared by VAR Room Lite (mod) and Full (admin) ──────
    const BanActionPanel = ({ target, allowedTiers, onClose, onDone }) => {
        const { toast } = useToast();
        const [tier, setTier] = useState(allowedTiers[0]);
        const [reason, setReason] = useState('');
        const [customMessage, setCustomMessage] = useState('');
        const [submitting, setSubmitting] = useState(false);

        const confirm = async () => {
            setSubmitting(true);
            try {
                const { error } = await window._sb.rpc('issue_ban', {
                    p_target_user_id: target.id,
                    p_tier: tier,
                    p_reason: reason || null,
                    p_custom_message: customMessage || null,
                });
                if (error) throw error;
                toast(`${BAN_TIER_LABELS[tier]} issued for ${target.email}`, 'success');
                onDone?.();
            } catch (e) {
                toast('Ban failed: ' + e.message, 'error');
            } finally {
                setSubmitting(false);
            }
        };

        return (
            <div className="bg-slate-900/80 border border-red-500/20 rounded-xl p-4 mt-2 space-y-3">
                <p className="text-sm text-white font-semibold">Ban {target.email}</p>
                <div>
                    <label className="text-xs text-slate-400 mb-1 block">Tier</label>
                    <select value={tier} onChange={e => setTier(e.target.value)}
                        className="w-full bg-slate-800/60 border border-white/5 rounded-lg px-3 py-2 text-sm text-white focus:outline-none">
                        {allowedTiers.map(t => <option key={t} value={t}>{BAN_TIER_LABELS[t]}</option>)}
                    </select>
                </div>
                <div>
                    <label className="text-xs text-slate-400 mb-1 block">Internal reason (staff only)</label>
                    <input value={reason} onChange={e => setReason(e.target.value)} placeholder="e.g. Repeated spam links"
                        className="w-full bg-slate-800/60 border border-white/5 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none" />
                </div>
                <div>
                    <label className="text-xs text-slate-400 mb-1 block">Message shown to user</label>
                    <textarea value={customMessage} onChange={e => setCustomMessage(e.target.value)} rows={2} placeholder="Optional — explains why they were banned"
                        className="w-full bg-slate-800/60 border border-white/5 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none resize-none" />
                </div>
                {(tier === 'ip' || tier === 'hwid_ip') && (
                    <p className="text-xs text-yellow-400/80 bg-yellow-500/5 border border-yellow-500/20 rounded-lg px-3 py-2">
                        ⚠️ Unappealable. Blocks the user's {tier === 'hwid_ip' ? 'device fingerprint and ' : ''}IP address, not just this account.
                    </p>
                )}
                <div className="flex gap-2">
                    <button onClick={confirm} disabled={submitting}
                        className="flex-1 py-2 rounded-lg bg-red-500 hover:bg-red-600 disabled:opacity-50 transition-colors text-white font-semibold text-sm">
                        {submitting ? 'Issuing...' : 'Confirm Ban'}
                    </button>
                    <button onClick={onClose} className="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 transition-colors text-slate-300 text-sm">
                        Cancel
                    </button>
                </div>
            </div>
        );
    };

    // ─── VAR Room Modal (Lite = Moderator, Full = Admin) ────────────────────────
    const VarRoomModal = () => {
        const { varRoomOpen, setVarRoomOpen } = useStore();
        const { toast } = useToast();
        const [verifiedRole, setVerifiedRole] = useState(null); // null while checking
        const [tab, setTab] = useState('reports');
        const [reports, setReports] = useState([]);
        const [users, setUsers] = useState([]);
        const [userQuery, setUserQuery] = useState('');
        const [alerts, setAlerts] = useState([]);
        const [auditLog, setAuditLog] = useState([]);
        const [loading, setLoading] = useState(false);
        const [banTarget, setBanTarget] = useState(null); // { id, email } | null

        // Re-verify role server-side every time the modal opens. This is the
        // real gate — even if a client somehow forces varRoomOpen=true, this
        // query is governed by RLS ("see your own row") and will return
        // role='user' for anyone who isn't actually staff, so we deny + log.
        useEffect(() => {
            if (!varRoomOpen) { setVerifiedRole(null); return; }
            let cancelled = false;

            const deny = async () => {
                try { await window._sb.rpc('log_security_alert', { p_action: 'var_room_unauthorized_attempt', p_details: {} }); } catch (_) {}
                if (cancelled) return;
                toast('Access denied. This attempt has been logged.', 'error');
                setVarRoomOpen(false);
            };

            (async () => {
                try {
                    const { data: { user } } = await window._sb.auth.getUser();
                    if (!user) return deny();
                    const { data: profile, error } = await window._sb.from('profiles').select('role').eq('id', user.id).single();
                    if (error || !profile?.role || profile.role === 'user') return deny();
                    if (!cancelled) setVerifiedRole(profile.role);
                } catch (e) {
                    deny();
                }
            })();

            return () => { cancelled = true; };
        }, [varRoomOpen]);

        const loadTab = useCallback(async (t) => {
            setLoading(true);
            try {
                if (t === 'reports') {
                    const { data, error } = await window._sb.rpc('list_reports');
                    if (error) throw error;
                    setReports(data || []);
                } else if (t === 'users') {
                    const { data, error } = await window._sb.rpc('search_users', { p_query: userQuery });
                    if (error) throw error;
                    setUsers(data || []);
                } else if (t === 'alerts') {
                    const { data, error } = await window._sb.rpc('list_security_alerts');
                    if (error) throw error;
                    setAlerts(data || []);
                } else if (t === 'audit') {
                    const { data, error } = await window._sb.rpc('list_mod_actions');
                    if (error) throw error;
                    setAuditLog(data || []);
                }
            } catch (e) {
                toast('Failed to load: ' + e.message, 'error');
            } finally {
                setLoading(false);
            }
        }, [userQuery, toast]);

        useEffect(() => {
            if (verifiedRole) loadTab(tab);
        }, [verifiedRole, tab]); // eslint-disable-line

        if (!varRoomOpen) return null;

        if (!verifiedRole) {
            return (
                <div className="settings-overlay fade-in">
                    <div className="glass rounded-2xl px-8 py-6 text-center text-slate-400 text-sm">Verifying access…</div>
                </div>
            );
        }

        const isAdmin = verifiedRole === 'admin';
        const allowedBanTiers = isAdmin ? ADMIN_BAN_TIERS : MOD_BAN_TIERS;

        const warnUser = async (targetId, email) => {
            const message = window.prompt(`Warning message for ${email}:`);
            if (!message) return;
            try {
                const { error } = await window._sb.rpc('issue_warning', { p_target_user_id: targetId, p_message: message });
                if (error) throw error;
                toast('Warning issued', 'success');
            } catch (e) { toast('Failed: ' + e.message, 'error'); }
        };

        const dismissReport = async (reportId) => {
            try {
                const { error } = await window._sb.rpc('review_report', { p_report_id: reportId, p_status: 'dismissed' });
                if (error) throw error;
                loadTab('reports');
            } catch (e) { toast('Failed: ' + e.message, 'error'); }
        };

        const promoteDemote = async (targetId, newRole, label) => {
            if (!window.confirm(`${label}? This takes effect immediately.`)) return;
            try {
                const { error } = await window._sb.rpc('set_user_role', { p_target_user_id: targetId, p_new_role: newRole });
                if (error) throw error;
                toast('Role updated', 'success');
                loadTab('users');
            } catch (e) { toast('Failed: ' + e.message, 'error'); }
        };

        const unbanUser = async (targetId, email) => {
            if (!window.confirm(`Unban ${email}?`)) return;
            try {
                const { error } = await window._sb.rpc('unban_user', { p_target_user_id: targetId });
                if (error) throw error;
                toast('User unbanned', 'success');
                loadTab('users');
            } catch (e) { toast('Failed: ' + e.message, 'error'); }
        };

        const TABS = isAdmin
            ? [
                { id: 'reports', label: '🚩 Reports' },
                { id: 'users',   label: '👥 Users' },
                { id: 'alerts',  label: '🛡️ Security' },
                { id: 'audit',   label: '📜 Audit Log' },
              ]
            : [
                { id: 'reports', label: '🚩 Reports' },
              ];

        return (
            <div className="settings-overlay fade-in" onClick={() => setVarRoomOpen(false)}>
                <div className="glass rounded-2xl p-6 max-w-2xl w-full mx-4 max-h-[85vh] overflow-y-auto slide-up" onClick={e => e.stopPropagation()}>
                    <div className="flex items-center justify-between mb-1">
                        <h2 className="text-white font-display font-bold text-lg flex items-center gap-2">
                            🏟️ VAR Room {!isAdmin && <span className="text-slate-500 text-sm font-normal">Lite</span>}
                        </h2>
                        <button onClick={() => setVarRoomOpen(false)} className="text-slate-500 hover:text-white text-xl leading-none">&times;</button>
                    </div>
                    <p className="text-xs text-slate-500 mb-4">Signed in as <RoleBadge role={verifiedRole} /></p>

                    {/* Tabs */}
                    {TABS.length > 1 && (
                        <div className="flex gap-1.5 mb-4 border-b border-white/5 pb-3">
                            {TABS.map(t => (
                                <button key={t.id} onClick={() => setTab(t.id)}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${tab === t.id ? 'bg-orange-500/15 text-orange-400' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/60'}`}>
                                    {t.label}
                                </button>
                            ))}
                        </div>
                    )}

                    {loading && <p className="text-slate-500 text-sm text-center py-8">Loading…</p>}

                    {/* ── Reports tab ────────────────────────────────────────────── */}
                    {!loading && tab === 'reports' && (
                        <div className="space-y-3">
                            {reports.length === 0 && <p className="text-slate-500 text-sm text-center py-8">No reports.</p>}
                            {reports.map(r => {
                                const isStaffTarget = r.reported_role === 'admin' || (verifiedRole === 'moderator' && r.reported_role === 'moderator');
                                return (
                                    <div key={r.id} className="bg-slate-800/40 border border-white/5 rounded-xl p-4">
                                        <div className="flex items-start justify-between gap-2 mb-1">
                                            <div>
                                                <p className="text-sm text-white font-medium">{r.reported_email || 'Unknown user'} {r.reported_role && <RoleBadge role={r.reported_role} />}</p>
                                                <p className="text-xs text-slate-500 mt-0.5">Reported by {r.reporter_email || 'anonymous'} · {new Date(r.created_at).toLocaleString()}</p>
                                            </div>
                                            <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full ${r.status === 'open' ? 'bg-yellow-500/15 text-yellow-400' : 'bg-slate-700/60 text-slate-400'}`}>{r.status}</span>
                                        </div>
                                        <p className="text-sm text-slate-300 mt-2"><span className="text-slate-500">Reason:</span> {r.reason}</p>
                                        {r.details && <p className="text-xs text-slate-400 mt-1">{r.details}</p>}

                                        {isStaffTarget ? (
                                            <p className="text-xs text-slate-500 italic mt-3">Staff account — {verifiedRole === 'moderator' ? 'escalate to Admin.' : 'cannot act on the admin account.'}</p>
                                        ) : r.status === 'open' && r.reported_user_id ? (
                                            <div className="flex flex-wrap gap-2 mt-3">
                                                <button onClick={() => warnUser(r.reported_user_id, r.reported_email)} className="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 transition-colors">⚠️ Warn</button>
                                                <button onClick={() => setBanTarget({ id: r.reported_user_id, email: r.reported_email, reportId: r.id })} className="px-3 py-1.5 rounded-lg bg-red-500/15 hover:bg-red-500/25 text-xs text-red-400 transition-colors">🔨 Ban</button>
                                                <button onClick={() => dismissReport(r.id)} className="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-xs text-slate-400 transition-colors">Dismiss</button>
                                            </div>
                                        ) : null}

                                        {banTarget?.reportId === r.id && (
                                            <BanActionPanel
                                                target={banTarget}
                                                allowedTiers={allowedBanTiers}
                                                onClose={() => setBanTarget(null)}
                                                onDone={async () => {
                                                    setBanTarget(null);
                                                    await window._sb.rpc('review_report', { p_report_id: r.id, p_status: 'actioned' });
                                                    loadTab('reports');
                                                }}
                                            />
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* ── Users tab (admin only) ────────────────────────────────── */}
                    {!loading && tab === 'users' && isAdmin && (
                        <div className="space-y-3">
                            <div className="flex gap-2">
                                <input value={userQuery} onChange={e => setUserQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && loadTab('users')}
                                    placeholder="Search by email…"
                                    className="flex-1 bg-slate-800/60 border border-white/5 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-orange-500/50" />
                                <button onClick={() => loadTab('users')} className="px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm text-slate-300 transition-colors">Search</button>
                            </div>
                            {users.length === 0 && <p className="text-slate-500 text-sm text-center py-8">No users found.</p>}
                            {users.map(u => (
                                <div key={u.id} className="bg-slate-800/40 border border-white/5 rounded-xl p-4">
                                    <div className="flex items-center justify-between gap-2 mb-2">
                                        <div>
                                            <p className="text-sm text-white font-medium">{u.email}</p>
                                            <p className="text-xs text-slate-500 mt-0.5">Joined {new Date(u.created_at).toLocaleDateString()}</p>
                                        </div>
                                        <RoleBadge role={u.role} />
                                    </div>
                                    {u.is_banned && (
                                        <p className="text-xs text-red-400 mb-2">🔨 {BAN_TIER_LABELS[u.ban_tier] || u.ban_tier}{u.ban_expires ? ` · expires ${new Date(u.ban_expires).toLocaleDateString()}` : ' · never expires'}</p>
                                    )}
                                    <div className="flex flex-wrap gap-2">
                                        {u.role === 'user' && (
                                            <button onClick={() => promoteDemote(u.id, 'moderator', `Promote ${u.email} to Moderator`)} className="px-3 py-1.5 rounded-lg bg-blue-500/15 hover:bg-blue-500/25 text-xs text-blue-400 transition-colors">⬆ Promote to Moderator</button>
                                        )}
                                        {u.role === 'moderator' && (
                                            <>
                                                <button onClick={() => promoteDemote(u.id, 'admin', `Promote ${u.email} to Admin — this will demote the current Admin to Moderator`)} className="px-3 py-1.5 rounded-lg bg-orange-500/15 hover:bg-orange-500/25 text-xs text-orange-400 transition-colors">⬆ Promote to Admin</button>
                                                <button onClick={() => promoteDemote(u.id, 'user', `Demote ${u.email} to User`)} className="px-3 py-1.5 rounded-lg bg-slate-700/60 hover:bg-slate-700 text-xs text-slate-300 transition-colors">⬇ Demote to User</button>
                                            </>
                                        )}
                                        {u.role !== 'admin' && (
                                            u.is_banned
                                                ? <button onClick={() => unbanUser(u.id, u.email)} className="px-3 py-1.5 rounded-lg bg-green-500/15 hover:bg-green-500/25 text-xs text-green-400 transition-colors">✓ Unban</button>
                                                : <button onClick={() => setBanTarget(prev => prev?.id === u.id ? null : { id: u.id, email: u.email })} className="px-3 py-1.5 rounded-lg bg-red-500/15 hover:bg-red-500/25 text-xs text-red-400 transition-colors">🔨 Ban</button>
                                        )}
                                        {u.role === 'admin' && <span className="text-xs text-slate-500 italic px-1 py-1.5">Cannot be moderated</span>}
                                    </div>
                                    {banTarget?.id === u.id && !banTarget?.reportId && (
                                        <BanActionPanel
                                            target={banTarget}
                                            allowedTiers={allowedBanTiers}
                                            onClose={() => setBanTarget(null)}
                                            onDone={() => { setBanTarget(null); loadTab('users'); }}
                                        />
                                    )}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* ── Security alerts tab (admin only) ──────────────────────── */}
                    {!loading && tab === 'alerts' && isAdmin && (
                        <div className="space-y-2">
                            {alerts.length === 0 && <p className="text-slate-500 text-sm text-center py-8">No security alerts. 🎉</p>}
                            {alerts.map(a => (
                                <div key={a.id} className="bg-slate-800/40 border border-white/5 rounded-xl p-3 text-xs">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-red-400 font-semibold">{a.action}</span>
                                        <span className="text-slate-500">{new Date(a.created_at).toLocaleString()}</span>
                                    </div>
                                    <p className="text-slate-400">{a.email || 'Unauthenticated visitor'}</p>
                                    {a.details && Object.keys(a.details).length > 0 && (
                                        <p className="text-slate-500 mt-1 font-mono">{JSON.stringify(a.details)}</p>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* ── Audit log tab (admin only) ─────────────────────────────── */}
                    {!loading && tab === 'audit' && isAdmin && (
                        <div className="space-y-2">
                            {auditLog.length === 0 && <p className="text-slate-500 text-sm text-center py-8">No actions logged yet.</p>}
                            {auditLog.map(m => (
                                <div key={m.id} className="bg-slate-800/40 border border-white/5 rounded-xl p-3 text-xs">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-white font-semibold">{m.action_type}</span>
                                        <span className="text-slate-500">{new Date(m.created_at).toLocaleString()}</span>
                                    </div>
                                    <p className="text-slate-400">{m.actor_email || 'system'} → {m.target_email || '—'}</p>
                                    {m.details && Object.keys(m.details).length > 0 && (
                                        <p className="text-slate-500 mt-1 font-mono">{JSON.stringify(m.details)}</p>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );
    };

    // ─── Legal Components ────────────────────────────────────────────────────────
    const LegalModal = () => {
        const { legalModal, setLegalModal, legalPendingAck, setLegalPendingAck, legalAckQueue, setLegalAckQueue } = useStore();
        if (!legalModal) return null;

        const isToS = legalModal === 'tos';

        const handleClose = async () => {
            if (legalPendingAck) {
                // Save acknowledgment to Supabase
                const metaKey = isToS ? 'tos_acknowledged' : 'privacy_acknowledged';
                try {
                    await window._sb.auth.updateUser({
                        data: { [metaKey]: true, [`${metaKey}_at`]: new Date().toISOString() }
                    });
                    // Also update local user object so re-checks don't re-trigger
                    if (window._sbUser) {
                        window._sbUser.user_metadata = {
                            ...(window._sbUser.user_metadata ?? {}),
                            [metaKey]: true
                        };
                    }
                } catch (e) {
                    console.warn('Could not save ack:', e);
                }

                // Advance to next doc in queue or finish
                if (legalAckQueue.length > 0) {
                    const [next, ...rest] = legalAckQueue;
                    setLegalAckQueue(rest);
                    setLegalModal(next);
                    return; // keep pendingAck true
                } else {
                    setLegalPendingAck(false);
                }
            }
            setLegalModal(null);
        };

        const totalAckDocs = legalPendingAck
            ? (isToS && legalAckQueue.some(d => d === 'privacy') ? 2 : legalAckQueue.length + 1)
            : null;
        const currentStep = legalPendingAck
            ? (isToS ? 1 : totalAckDocs)
            : null;

        return (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4 md:p-8 slide-up">
                <div className="glass w-full max-w-3xl max-h-full rounded-2xl flex flex-col overflow-hidden border border-white/10 shadow-2xl">
                    <div className="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-slate-900/50">
                        <h2 className="text-xl font-display font-bold text-white">{isToS ? 'Terms of Service' : 'Privacy Policy'}</h2>
                        <div className="flex items-center gap-3">
                            {legalPendingAck && totalAckDocs > 1 && (
                                <span className="text-xs font-medium text-orange-400 bg-orange-500/10 border border-orange-500/20 rounded-full px-3 py-1">
                                    Step {currentStep} of {totalAckDocs}
                                </span>
                            )}
                            {!legalPendingAck && (
                                <button onClick={handleClose} className="text-slate-500 hover:text-white transition-colors">
                                    <Icon path={I.close} className="w-5 h-5" />
                                </button>
                            )}
                        </div>
                    </div>
                    
                    <div className="p-6 overflow-y-auto flex-1 text-slate-300 text-sm space-y-4 md-content">
                        {isToS ? (
                            <>
                                <p><strong>Effective Date: June 16, 2026</strong></p>
                                
                                <h2>1. Acceptance of Terms</h2>

                                <p>You are responsible for the content you generate using our AI tools. You agree not to create or distribute content that is illegal, harmful, or violates the rights of others.</p>

                                <p className="uppercase font-bold text-white/90">To the maximum extent permitted by applicable law, SIUU Studio, its affiliates, directors, employees, and agents shall not be liable for any indirect, incidental, special, consequential, or punitive damages, or any loss of profits or revenues, whether incurred directly or indirectly, or any loss of data, use, goodwill, or other intangible losses, resulting from (A) your access to or use of or inability to access or use the services; (B) any conduct or content of any third party on the services; or (C) unauthorized access, use, or alteration of your transmissions or content.</p>

                                <h2>4. Dispute Resolution and Binding Arbitration</h2>
                                <p><strong>Please read this section carefully as it affects your legal rights.</strong> Any dispute, claim, or controversy arising out of or relating to these Terms or the breach, termination, enforcement, interpretation, or validity thereof, including the determination of the scope or applicability of this agreement to arbitrate, shall be determined by binding arbitration in California before one arbitrator. Judgment on the Award may be entered in any court having jurisdiction. You agree to waive your right to a jury trial or to participate in a class action.</p>
                                
                                <h2>5. Changes to Terms</h2>
                                <p>We reserve the right to modify these Terms at any time. We will provide conspicuous notice of major changes to these Terms on our platform.</p>

				<h2>6. User Accounts</h2>
				<p>To access certain features of the Service, you may be required to create an account. You agree to provide accurate and complete information and to keep your login credentials secure. You are responsible for all activities that occur under your account. SIUU Studio shall not be liable for any loss or damage arising from unauthorized use of your account.</p>

				<h2>7. Eligibility</h2>
				<p>You must be at least 13 years of age to use the Service. If you are under 18, you represent that you have obtained permission from a parent or legal guardian. By accessing or using the Service, you affirm that you meet these eligibility requirements.</p>

                            </>
                        ) : (
                            <>
                                <p><strong>Effective Date: June 16, 2026</strong></p>
                                <p>This Privacy Policy explains how SIUU Studio collects, uses, and discloses information about you in compliance with the California Consumer Privacy Act (CCPA) and the California Privacy Rights Act (CPRA).</p>

                                <h2>1. Information We Collect</h2>
                                <p>We collect the following categories of personal information when you use our platform:</p>
                                <ul>

				<h2>6. AI Technology & Transparency (AB 2013 / SB 942)</h2>
<p>SIUU Studio's AI features are powered by the Cerebras AI API. We have not fine-tuned, retrained, or substantially modified the underlying base model. All AI behavior is guided by proprietary system instructions designed to optimize content strategy for creators. SIUU Studio is the deploying provider of this AI tool, not the developer of the underlying model.</p>

            abortRef.current = new AbortController();
            setIsGenerating(true);
            setStreamContent('');
            setCurrentIdea(null);

                const idea = await api.generateIdea(topic, { onStream: setStreamContent, signal: abortRef.current.signal });

                updateProject(proj.id, { idea });
                toast('Idea generated! SIUUU!', 'success');

                if (e.name !== 'AbortError') toast(`Generation failed: ${e.message}`, 'error', 6000);

                            <div className="lg:col-span-1 space-y-1.5">
                                {currentEditingGuide.steps.map((s, i) => (
                                    <button key={i} onClick={() => setStep(i)} className={`w-full text-left px-4 py-3 rounded-xl text-sm transition-all ${i === step ? 'nav-active text-orange-400 font-medium' : 'text-slate-500 hover:bg-slate-800 hover:text-white'}`}>
                                        <span className="font-display font-bold mr-2">{s.step}.</span>{s.title}
                                    </button>
                                ))}
                            </div>
                            <div className="lg:col-span-2">
                                <Card className="h-full">
                                    <div className="flex items-center justify-between mb-5">
                                        <h4 className="text-lg font-display font-bold text-white">{currentEditingGuide.steps[step].title}</h4>
                                        <Badge variant={currentEditingGuide.steps[step].difficulty === 'Easy' ? 'success' : currentEditingGuide.steps[step].difficulty === 'Hard' ? 'warning' : 'info'}>{currentEditingGuide.steps[step].difficulty}</Badge>
                                    </div>
                                    <p className="text-slate-300 leading-relaxed mb-5 text-sm">{currentEditingGuide.steps[step].description}</p>
                                    {currentEditingGuide.steps[step].tips.length > 0 && (
                                        <div className="bg-slate-900/60 rounded-xl p-4 border border-slate-700/40">
                                            <h5 className="text-orange-400 font-semibold text-xs uppercase tracking-wider mb-3 flex items-center gap-1.5"><Icon path={I.lightbulb} className="w-3.5 h-3.5" /> Pro Tips</h5>
                                            <ul className="space-y-2">{currentEditingGuide.steps[step].tips.map((tip, i) => <li key={i} className="text-slate-300 text-sm flex items-start gap-2"><span className="text-orange-500 mt-1 flex-shrink-0">•</span>{tip}</li>)}</ul>
                                        </div>
                                    )}
                                    <div className="flex justify-between mt-5">
                                        <Btn onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0} variant="secondary" icon="chevronLeft" size="sm">Prev</Btn>
                                        <Btn onClick={() => setStep(Math.min(currentEditingGuide.steps.length - 1, step + 1))} disabled={step === currentEditingGuide.steps.length - 1} variant="primary" size="sm">Next <Icon path={I.chevronRight} className="w-4 h-4" /></Btn>
                                    </div>
                                </Card>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // ─── Projects ────────────────────────────────────────────────────────────────
    const Projects = () => {
        const { projects, projectsLoaded, loadProject, createProject, deleteProject, currentProject, clearActiveProject } = useStore();
        const { toast } = useToast();
        const [name, setName] = useState('');

        const handleCreate = () => {
            if (!name.trim()) return;
            createProject(name, false);
            setName('');
            toast('Project created!', 'success');
        };

        const exportMarkdown = (e, p) => {
            e.stopPropagation();
            let md = `# ${p.name}\nGenerated on SIUU STUDIO\n\n`;
            
            if (p.idea) {
                md += `## 💡 Concept: ${p.idea.title}\n`;
                md += `**Target:** ${p.idea.targetAudience} | **Duration:** ${p.idea.estimatedDuration} | **Difficulty:** ${p.idea.difficulty}\n\n`;
                md += `### Hook\n${p.idea.hook}\n\n`;
                md += `### Twist\n${p.idea.twist}\n\n`;
                md += `### Full Concept\n${p.idea.concept}\n\n`;
                md += `**Tags:** ${p.idea.tags.join(', ')}\n\n---\n\n`;
            }
            if (p.hookAnalysis) {
                md += `## 🎯 Hook Analysis\n**Score:** ${p.hookAnalysis.score}/100\n\n**Feedback:** ${p.hookAnalysis.feedback}\n\n**Suggested Rewrite:** ${p.hookAnalysis.rewrite}\n\n---\n\n`;
            }
            if (p.thumbnailData) {
                md += `## 🖼️ Title & Thumbnail Lab\n### Titles\n`;
                p.thumbnailData.titles.forEach(t => md += `- ${t}\n`);
                md += `\n### Thumbnail Prompt\n\`${p.thumbnailData.thumbnailPrompt}\`\n\n---\n\n`;
            }
            if (p.shotPlan) {
                md += `## 🎥 Shot Plan (${p.shotPlan.totalDuration})\n`;
                p.shotPlan.shots.forEach(s => {
                    md += `### Shot ${s.number}: ${s.description}\n`;
                    md += `- Angle: ${s.cameraAngle}\n- Movement: ${s.cameraMovement}\n- Duration: ${s.duration}\n- Lighting: ${s.lighting}\n`;
                    if (s.notes) md += `- Notes: ${s.notes}\n`;
                    md += `\n`;
                });
                md += `**Equipment:** ${p.shotPlan.equipment.join(', ')}\n\n---\n\n`;
            }
            if (p.editingGuide) {
                md += `## ✂️ Editing Guide (${p.editingGuide.title})\n`;
                p.editingGuide.steps.forEach(s => {
                    md += `### Step ${s.step}: ${s.title} [${s.difficulty}]\n${s.description}\n`;
                    if (s.tips.length) {
                        md += `*Tips:*\n`;
                        s.tips.forEach(t => md += `- ${t}\n`);
                    }
                    md += `\n`;
                });
            }

            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${p.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_siuu_studio.md`;
            a.click();
            URL.revokeObjectURL(url);
            toast('Project exported to Markdown!', 'success');
        };

        return (
            <div className="space-y-6 slide-up">
                <div className="flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                    <div>
                        <h2 className="text-2xl font-display font-bold text-white">Project Studio</h2>
                        <p className="text-slate-500 text-xs mt-1">Projects sync to your account automatically ☁️</p>
                    </div>
                    <div className="flex gap-2 w-full md:w-auto">
                        <input type="text" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleCreate()}
                            placeholder="New project name..." className="flex-1 md:w-56 px-4 py-2 bg-slate-900 border border-slate-700/60 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white text-sm" />
                        <Btn onClick={handleCreate} icon="plus">Create</Btn>
                    </div>
                </div>

                {!projectsLoaded ? (
                    <div className="flex flex-col items-center justify-center py-20 gap-4 text-slate-500">
                        <svg className="w-8 h-8 animate-spin text-orange-500" fill="none" viewBox="0 0 24 24">
                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                        </svg>
                        <p className="text-sm">Loading your projects…</p>
                    </div>
                ) : projects.length === 0 ? (
                    <EmptyState icon="folder" title="No projects yet" description="Start by generating a new video concept or create an empty project folder above." />
                ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {projects.map(p => (
                            <div key={p.id} onClick={() => loadProject(p)} className={`glass rounded-2xl p-5 cursor-pointer transition-all hover:-translate-y-1 hover:shadow-xl hover:shadow-orange-500/10 border ${currentProject?.id === p.id ? 'border-orange-500/50 bg-slate-800/80' : 'border-white/5'}`}>
                                <div className="flex items-start justify-between mb-3">
                                    <h3 className="text-base font-display font-semibold text-white truncate pr-2">{p.name}</h3>
                                    <div className="flex gap-1">
                                        <button onClick={e => exportMarkdown(e, p)} title="Export to Markdown" className="text-slate-500 hover:text-blue-400 p-1 transition-colors"><Icon path={I.download} className="w-4 h-4" /></button>
                                        <button onClick={e => { e.stopPropagation(); deleteProject(p.id); toast('Deleted', 'info'); }} title="Delete Project" className="text-slate-500 hover:text-red-400 p-1 transition-colors"><Icon path={I.trash} className="w-4 h-4" /></button>
                                    </div>
                                </div>
                                <p className="text-xs text-slate-500 mb-4">Updated {new Date(p.updatedAt).toLocaleDateString()}</p>
                                <div className="flex flex-wrap gap-1.5">
                                    {p.idea ? <Badge variant="success">Idea</Badge> : <Badge variant="default">No Idea</Badge>}
                                    {p.hookAnalysis && <Badge variant="orange">Hook</Badge>}
                                    {p.thumbnailData && <Badge variant="info">Titles</Badge>}
                                    {p.shotPlan && <Badge variant="warning">Shots</Badge>}
                                    {p.script && <Badge variant="default">Script</Badge>}
                                    {p.captions && <Badge variant="default">Captions</Badge>}
                                </div>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    };

    // ─── Script Writer ───────────────────────────────────────────────────────────
    const ScriptWriter = () => {
        const { api, currentIdea, currentScript, setCurrentScript, currentProject, updateProject, isGenerating, setIsGenerating, streamContent, setStreamContent, abortRef } = useStore();
        const { toast } = useToast();
        const [topic, setTopic] = useState('');
        const [platform, setPlatform] = useState('TikTok/Reels');
        const platforms = ['TikTok/Reels', 'YouTube Shorts', 'YouTube Long-Form', 'Instagram', 'LinkedIn'];

        useEffect(() => { if (currentIdea && !topic) setTopic(currentIdea.title + ' — ' + currentIdea.concept); }, [currentIdea]);

        const handleGenerate = async () => {
            if (!topic.trim() || isGenerating) return;
            abortRef.current = new AbortController();
            setIsGenerating(true); setStreamContent(''); setCurrentScript(null);
            try {
                const result = await api.generateScript(topic, platform, { onStream: setStreamContent, signal: abortRef.current.signal });
                setCurrentScript(result);
                if (currentProject) updateProject(currentProject.id, { script: result });
                toast('Script ready! SIUUU! 🏆', 'success');
            } catch (e) {
                if (e.name !== 'AbortError') toast(`Failed: ${e.message}`, 'error');
            } finally { setIsGenerating(false); setStreamContent(''); }
        };

        const fullScript = currentScript ? [
            `HOOK: ${currentScript.hook}`,
            currentScript.intro ? `\nINTRO:\n${currentScript.intro}` : '',
            ...currentScript.sections.map(s => `\n${s.title.toUpperCase()}:\n${s.content}`),
            `\nCALL TO ACTION:\n${currentScript.cta}`
        ].join('\n') : '';

        return (
            <div className="space-y-6 slide-up">
                <div className="mb-6">
                    <h2 className="text-2xl font-display font-bold text-white">Script Writer</h2>
                    <p className="text-slate-500 text-sm mt-1">Full ready-to-film scripts in seconds</p>
                </div>
                <Card>
                    <div className="space-y-4">
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div className="sm:col-span-2">
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Video Idea or Topic</label>
                                <input type="text" value={topic} onChange={e => setTopic(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleGenerate()}
                                    placeholder="e.g., How I gained 10k followers in 30 days"
                                    className="w-full px-4 py-3 bg-slate-900 border border-slate-700/60 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white placeholder-slate-600 text-sm"
                                    disabled={isGenerating} />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Platform</label>
                                <select value={platform} onChange={e => setPlatform(e.target.value)}
                                    className="w-full px-4 py-3 bg-slate-900 border border-slate-700/60 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white text-sm"
                                    disabled={isGenerating}>
                                    {platforms.map(p => <option key={p}>{p}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <Btn onClick={handleGenerate} disabled={isGenerating || !topic.trim()} icon={isGenerating ? 'refresh' : 'fileText'} className="flex-1 justify-center">
                                {isGenerating ? 'Writing Script...' : currentScript ? 'Rewrite Script' : 'Write Script'}
                            </Btn>
                            {isGenerating && <Btn onClick={() => abortRef.current?.abort()} variant="danger" icon="stop" size="md">Stop</Btn>}
                        </div>
                        <p className="text-xs text-slate-600 leading-relaxed">⚠️ AI-generated scripts are starting points — always adapt to your own voice before filming.</p>
                    </div>
                </Card>

                {isGenerating && streamContent && <StreamBox content={streamContent} label="Writing your script..." />}

                {currentScript && !isGenerating && (
                    <div className="space-y-4 slide-up">
                        <div className="flex items-center justify-between">
                            <div className="flex gap-2">
                                <Badge variant="orange">{currentScript.platform}</Badge>
                                <Badge variant="info">{currentScript.duration}</Badge>
                                <Badge variant="default">{currentScript.tone}</Badge>
                            </div>
                            <Btn onClick={() => { navigator.clipboard.writeText(fullScript); toast('Full script copied!', 'info'); }} variant="secondary" icon="copy" size="sm">Copy All</Btn>
                        </div>

                        <Card className="border border-orange-500/20 bg-orange-500/5">
                            <div className="flex items-center justify-between mb-3">
                                <h4 className="text-orange-400 font-semibold text-xs uppercase tracking-wider flex items-center gap-1.5"><Icon path={I.zap} className="w-3.5 h-3.5" /> Opening Hook</h4>
                                <button onClick={() => { navigator.clipboard.writeText(currentScript.hook); toast('Copied!', 'info'); }} className="p-1.5 hover:bg-black/30 rounded-lg text-slate-500 hover:text-white transition-colors"><Icon path={I.copy} className="w-3.5 h-3.5" /></button>
                            </div>
                            <p className="text-white text-lg font-display font-semibold leading-snug">"{currentScript.hook}"</p>
                        </Card>

                        {currentScript.intro && (
                            <Card title="Intro" subtitle="Set the scene">
                                <p className="text-slate-300 text-sm leading-relaxed">{currentScript.intro}</p>
                            </Card>
                        )}

                        {currentScript.sections.map((section, i) => (
                            <Card key={i} title={section.title} action={
                                <button onClick={() => { navigator.clipboard.writeText(section.content); toast('Copied!', 'info'); }} className="p-1.5 hover:bg-slate-700 rounded-lg text-slate-500 hover:text-white transition-colors"><Icon path={I.copy} className="w-3.5 h-3.5" /></button>
                            }>
                                <p className="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap">{section.content}</p>
                            </Card>
                        ))}

                        <Card className="border border-green-500/20 bg-green-500/5">
                            <div className="flex items-center justify-between mb-3">
                                <h4 className="text-green-400 font-semibold text-xs uppercase tracking-wider">Call to Action</h4>
                                <button onClick={() => { navigator.clipboard.writeText(currentScript.cta); toast('Copied!', 'info'); }} className="p-1.5 hover:bg-black/30 rounded-lg text-slate-500 hover:text-white transition-colors"><Icon path={I.copy} className="w-3.5 h-3.5" /></button>
                            </div>
                            <p className="text-slate-300 text-sm">{currentScript.cta}</p>
                        </Card>
                    </div>
                )}
            </div>
        );
    };

    // ─── Caption Generator ───────────────────────────────────────────────────────
    const CaptionGenerator = () => {
        const { api, currentIdea, currentCaptions, setCurrentCaptions, currentProject, updateProject, isGenerating, setIsGenerating, streamContent, setStreamContent, abortRef } = useStore();
        const { toast } = useToast();
        const [topic, setTopic] = useState('');
        const [platform, setPlatform] = useState('TikTok');
        const platforms = ['TikTok', 'Instagram', 'YouTube', 'LinkedIn', 'Twitter/X'];

        useEffect(() => { if (currentIdea && !topic) setTopic(currentIdea.title); }, [currentIdea]);

        const handleGenerate = async () => {
            if (!topic.trim() || isGenerating) return;
            abortRef.current = new AbortController();
            setIsGenerating(true); setStreamContent(''); setCurrentCaptions(null);
            try {
                const result = await api.generateCaptions(topic, platform, { onStream: setStreamContent, signal: abortRef.current.signal });
                setCurrentCaptions(result);
                if (currentProject) updateProject(currentProject.id, { captions: result });
                toast('Captions generated! SIUUU!', 'success');
            } catch (e) {
                if (e.name !== 'AbortError') toast(`Failed: ${e.message}`, 'error');
            } finally { setIsGenerating(false); setStreamContent(''); }
        };

        return (
            <div className="space-y-6 slide-up">
                <div className="mb-6">
                    <h2 className="text-2xl font-display font-bold text-white">Caption Generator</h2>
                    <p className="text-slate-500 text-sm mt-1">Viral captions + hashtags for every platform</p>
                </div>
                <Card>
                    <div className="space-y-4">
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div className="sm:col-span-2">
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Video Topic or Idea</label>
                                <input type="text" value={topic} onChange={e => setTopic(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleGenerate()}
                                    placeholder="e.g., Morning routine productivity tips"
                                    className="w-full px-4 py-3 bg-slate-900 border border-slate-700/60 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white placeholder-slate-600 text-sm"
                                    disabled={isGenerating} />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Platform</label>
                                <select value={platform} onChange={e => setPlatform(e.target.value)}
                                    className="w-full px-4 py-3 bg-slate-900 border border-slate-700/60 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white text-sm"
                                    disabled={isGenerating}>
                                    {platforms.map(p => <option key={p}>{p}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <Btn onClick={handleGenerate} disabled={isGenerating || !topic.trim()} icon={isGenerating ? 'refresh' : 'hash'} className="flex-1 justify-center">
                                {isGenerating ? 'Generating...' : currentCaptions ? 'Regenerate Captions' : 'Generate Captions'}
                            </Btn>
                            {isGenerating && <Btn onClick={() => abortRef.current?.abort()} variant="danger" icon="stop" size="md">Stop</Btn>}
                        </div>
                    </div>
                </Card>

                {isGenerating && streamContent && <StreamBox content={streamContent} label="Crafting viral captions..." />}

                {currentCaptions && !isGenerating && (
                    <div className="space-y-4 slide-up">
                        <div className="flex items-center gap-3">
                            <Badge variant="orange">{currentCaptions.platform}</Badge>
                            <div className="flex items-center gap-1.5 text-xs text-slate-500">
                                <Icon path={I.zap} className="w-3 h-3 text-orange-400" />
                                Power word: <span className="text-orange-400 font-semibold">{currentCaptions.hookWord}</span>
                            </div>
                            <div className="ml-auto text-xs text-slate-500">📅 Best time: {currentCaptions.bestTime}</div>
                        </div>

                        {currentCaptions.captions.map((item, i) => (
                            <Card key={i} title={`Caption Option ${i + 1}`} action={
                                <button onClick={() => { navigator.clipboard.writeText(item.caption + '\n\n' + item.hashtags); toast('Caption + hashtags copied!', 'info'); }}
                                    className="p-1.5 hover:bg-slate-700 rounded-lg text-slate-500 hover:text-white transition-colors"><Icon path={I.copy} className="w-3.5 h-3.5" /></button>
                            }>
                                <div className="space-y-3">
                                    <div className="bg-slate-900/60 rounded-xl p-4 border border-slate-700/40">
                                        <p className="text-slate-200 text-sm leading-relaxed">{item.caption}</p>
                                    </div>
                                    <div className="bg-blue-500/5 border border-blue-500/15 rounded-xl p-3">
                                        <p className="text-blue-400 text-xs leading-relaxed font-mono">{item.hashtags}</p>
                                    </div>
                                </div>
                            </Card>
                        ))}
                    </div>
                )}
            </div>
        );
    };

    // ─── Trend Analyzer ──────────────────────────────────────────────────────────
    const TrendAnalyzer = () => {
        const { api, currentTrends, setCurrentTrends, isGenerating, setIsGenerating, streamContent, setStreamContent, abortRef } = useStore();
        const { toast } = useToast();
        const [niche, setNiche] = useState('');

        const handleAnalyze = async () => {
            if (!niche.trim() || isGenerating) return;
            abortRef.current = new AbortController();
            setIsGenerating(true); setStreamContent(''); setCurrentTrends(null);
            try {
                const result = await api.analyzeTrends(niche, { onStream: setStreamContent, signal: abortRef.current.signal });
                setCurrentTrends(result);
                toast('Trends analyzed! SIUUU!', 'success');
            } catch (e) {
                if (e.name !== 'AbortError') toast(`Failed: ${e.message}`, 'error');
            } finally { setIsGenerating(false); setStreamContent(''); }
        };

        const trendColors = ['orange', 'info', 'success', 'warning', 'default'];

        return (
            <div className="space-y-6 slide-up">
                <div className="mb-6">
                    <h2 className="text-2xl font-display font-bold text-white">Trend Analyzer</h2>
                    <p className="text-slate-500 text-sm mt-1">Discover what's dominating your niche right now</p>
                </div>
                <Card>
                    <div className="space-y-4">
                        <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Your Niche</label>
                        <input type="text" value={niche} onChange={e => setNiche(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && handleAnalyze()}
                            placeholder="e.g., Fitness, Personal Finance, Gaming, Cooking, Fashion..."
                            className="w-full px-4 py-3 bg-slate-900 border border-slate-700/60 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-white placeholder-slate-600 text-sm"
                            disabled={isGenerating} />
                        <div className="flex gap-3">
                            <Btn onClick={handleAnalyze} disabled={isGenerating || !niche.trim()} icon={isGenerating ? 'refresh' : 'trendingUp'} className="flex-1 justify-center">
                                {isGenerating ? 'Analyzing...' : currentTrends ? 'Re-Analyze Trends' : 'Analyze Trends'}
                            </Btn>
                            {isGenerating && <Btn onClick={() => abortRef.current?.abort()} variant="danger" icon="stop" size="md">Stop</Btn>}
                        </div>
                        <p className="text-xs text-slate-600 leading-relaxed">⚠️ Trends are sourced from live web search and analyzed by AI — always verify with your own platform analytics before acting.</p>
                    </div>
                </Card>

                {isGenerating && streamContent && <StreamBox content={streamContent} label="Scanning your niche for trends..." />}

                {currentTrends && !isGenerating && (
                    <div className="space-y-4 slide-up">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-2">
                            <div className="glass rounded-xl p-4 border border-orange-500/20 bg-orange-500/5">
                                <p className="text-xs text-slate-500 uppercase tracking-wider mb-1 font-semibold">🏆 Top Format Right Now</p>
                                <p className="text-white font-display font-bold">{currentTrends.topFormat}</p>
                            </div>
                            <div className="glass rounded-xl p-4 border border-red-500/20 bg-red-500/5">
                                <p className="text-xs text-slate-500 uppercase tracking-wider mb-1 font-semibold">⛔ Avoid This</p>
                                <p className="text-slate-300 text-sm">{currentTrends.avoid}</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-3 mb-2">
                            <Badge variant="orange">{currentTrends.niche}</Badge>
                            {currentTrends.webSearched && (
                                <span className="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium border bg-green-500/10 text-green-400 border-green-500/20">
                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg>
                                    Live Web Search
                                </span>
                            )}
                        </div>

                        {currentTrends.sourcesUsed && (
                            <div className="glass rounded-xl p-3 border border-green-500/10 bg-green-500/5 text-xs text-slate-400">
                                <span className="text-green-400 font-semibold">Sources: </span>{currentTrends.sourcesUsed}
                            </div>
                        )}

                        <p className="text-xs text-slate-500 uppercase tracking-wider font-semibold px-1">Top 5 Trending Topics in <span className="text-orange-400">{currentTrends.niche}</span></p>

                        {currentTrends.trends.map((trend, i) => (
                            <div key={i} className="glass rounded-xl p-5 border border-white/5 hover:border-orange-500/20 transition-colors">
                                <div className="flex items-start gap-4">
                                    <div className="w-8 h-8 rounded-xl bg-orange-500/10 border border-orange-500/20 flex items-center justify-center flex-shrink-0">
                                        <span className="text-orange-400 font-display font-bold text-sm">{i + 1}</span>
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <h4 className="text-white font-display font-semibold mb-1">{trend.name}</h4>
                                        <p className="text-slate-500 text-xs mb-3">{trend.why}</p>
                                        <div className="bg-slate-900/60 rounded-lg p-3 border border-slate-700/40">
                                            <p className="text-xs text-slate-400 uppercase tracking-wider mb-1 font-semibold">Your Angle</p>
                                            <p className="text-slate-300 text-sm">{trend.angle}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    };

    // ─── Content Calendar ────────────────────────────────────────────────────────
    const ContentCalendar = () => {
        const { api, currentCalendar, setCurrentCalendar, isGenerating, setIsGenerating, streamContent, setStreamContent, abortRef } = useStore();
        const { toast } = useToast();
        const [niche, setNiche] = useState('');
        const [postsPerWeek, setPostsPerWeek] = useState(3);
        const [activeWeek, setActiveWeek] = useState(1);

        const handleGenerate = async () => {
            if (!niche.trim() || isGenerating) return;
            abortRef.current = new AbortController();
            setIsGenerating(true); setStreamContent(''); setCurrentCalendar(null); setActiveWeek(1);
            try {
                const result = await api.generateCalendar(niche, postsPerWeek, { onStream: setStreamContent, signal: abortRef.current.signal });
                setCurrentCalendar(result);
                toast(`${result.posts.length}-post calendar ready! SIUUU!`, 'success');
            } catch (e) {
                if (e.name !== 'AbortError') toast(`Failed: ${e.message}`, 'error');
            } finally { setIsGenerating(false); setStreamContent(''); }
        };

        const goalColors = { Awareness: 'info', Engagement: 'orange', Conversion: 'success', Retention: 'warning', default: 'default' };

        const weekPosts = currentCalendar ? currentCalendar.posts.filter(p => p.week === activeWeek) : [];
